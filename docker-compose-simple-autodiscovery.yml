version: '3.8'

services:
  # Beta Coordinator (Server Beta simulation)
  beta-coordinator:
    image: python:3.9-slim
    container_name: beta-coordinator
    ports:
      - "8181:8081"
    volumes:
      - ./beta_coordinator.py:/app/beta_coordinator.py
    working_dir: /app
    command: ["python", "beta_coordinator.py"]
    
  # Alpha Node 1 - Auto-discovery enabled
  alpha-node-1:
    image: python:3.9-slim
    container_name: alpha-node-1
    volumes:
      - ./alpha_node.py:/app/alpha_node.py
    working_dir: /app
    depends_on:
      - beta-coordinator
    command: ["python", "alpha_node.py", "alpha-1"]
    
  # Alpha Node 2 - Auto-discovery enabled
  alpha-node-2:
    image: python:3.9-slim
    container_name: alpha-node-2
    volumes:
      - ./alpha_node.py:/app/alpha_node.py
    working_dir: /app
    depends_on:
      - beta-coordinator
    command: ["python", "alpha_node.py", "alpha-2"]
    
  # Alpha Node 3 - Auto-discovery enabled  
  alpha-node-3:
    image: python:3.9-slim
    container_name: alpha-node-3
    volumes:
      - ./alpha_node.py:/app/alpha_node.py
    working_dir: /app
    depends_on:
      - beta-coordinator
    command: ["python", "alpha_node.py", "alpha-3"]