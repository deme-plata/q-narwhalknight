[package]
name = "q-zk-p2p"
version = "0.1.0"
edition = "2021"
description = "Zero-knowledge enhanced P2P networking for Q-NarwhalKnight"

[dependencies]
anyhow = "1.0"
ark-bn254 = "0.4"
ark-ff = "0.4"
ark-serialize = "0.4"
ark-std = "0.4"
bincode = "1.3"
blake3 = "1.5"
hex = "0.4"
rand = "0.8"
serde = { version = "1.0", features = ["derive"] }
thiserror = "1.0"
tokio = { version = "1.0", features = ["full"] }
tracing = "0.1"
uuid = { version = "1.0", features = ["v4"] }

# Internal dependencies
q-zk-snark = { path = "../q-zk-snark" }
q-zk-stark = { path = "../q-zk-stark" }
q-types = { path = "../q-types" }

[dev-dependencies]
tokio-test = "0.4"