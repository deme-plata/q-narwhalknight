[package]
name = "q-narwhalknight"
version = "0.1.0"
edition = "2021"
authors = ["Q-NarwhalKnight Team <team@q-narwhalknight.dev>"]
description = "Zero-configuration quantum mesh networking with proven DNS-Phantom steganographic peer discovery"
license = "MIT OR Apache-2.0"
repository = "https://github.com/deme-plata/q-narwhalknight"
keywords = ["quantum", "mesh", "networking", "p2p", "dns", "steganography"]
categories = ["network-programming", "cryptography"]
readme = "../../README.md"

[lib]
name = "q_narwhalknight"
path = "src/lib.rs"

[dependencies]
# Core quantum mesh components (proven working)
# q-dns-phantom = { path = "../q-dns-phantom" } # DEACTIVATED
q-network = { path = "../q-network" }
q-types = { path = "../q-types" }

# Plugin system integration  
q-plugin-system = { path = "../q-plugin-system", optional = true }

# Essential async/networking
tokio = { version = "1.0", features = ["full"] }
anyhow = "1.0"
tracing = "0.1"

# Serialization for configuration
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[dev-dependencies]
tokio-test = "0.4"
tracing-subscriber = "0.3"

[features]
default = ["dns-phantom", "connection-manager"]
dns-phantom = []
connection-manager = []
plugin-system = ["q-plugin-system"]
api = ["axum"] # REST API feature requires axum

# Web framework integrations
axum = ["dep:axum"]
warp = ["dep:warp"]

# Blockchain integrations  
blockchain = []
gaming = []

[dependencies.axum]
version = "0.6"
optional = true
features = ["ws"]

[dependencies.warp]
version = "0.3"
optional = true

[[example]]
name = "basic_mesh"
path = "examples/basic_mesh.rs"

[[example]]
name = "plugin_integration"
path = "examples/plugin_integration.rs"

[[example]]
name = "web_app_integration"
path = "examples/web_app_integration.rs"

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]