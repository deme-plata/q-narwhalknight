[package]
name = "q-tor-p2p"
version = "0.1.0"
edition = "2021"

[dependencies]
# Tor client
arti = "1.1"
arti-client = "0.9"
tor-rtcompat = "0.9"

# Async runtime
tokio = { version = "1.35", features = ["full"] }
futures = "0.3"
async-trait = "0.1"

# Networking
libp2p = { version = "0.53", features = ["tcp", "noise", "yamux", "kad", "mdns", "identify", "gossipsub"] }
multiaddr = "0.18"

# DHT and discovery
sha2 = "0.10"
bs58 = "0.5"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
bincode = "1.3"

# Error handling
anyhow = "1.0"
thiserror = "1.0"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Configuration
config = "0.13"
directories = "5.0"

# Cryptography
ed25519-dalek = "2.0"
x25519-dalek = "2.0"
rand = "0.8"

[dev-dependencies]
tempfile = "3.8"
wiremock = "0.5"