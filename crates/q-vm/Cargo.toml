[package]
name = "q-vm"
version = "0.1.0"
edition = "2021"
authors = ["Q-NarwhalKnight Team", "Server Beta"]
description = "Cryptobia Kingdom VM - Biological computing virtual machine for water-robot organisms"
readme = "README.md"

[dependencies]
clap = { version = "4.0", features = ["derive"] }
toml = "0.5"
# Original dependencies
tokio = { version = "1.35.0", features = ["full", "rt-multi-thread"] }
libp2p = { version = "0.53", features = ["tcp", "tokio", "noise", "yamux", "gossipsub", "identify", "ping", "kad", "dns", "mdns", "macros", "request-response"] }
serde = { version = "1.0", features = ["derive", "rc"] }
serde_json = "1.0"
serde-big-array = "0.4.0"
bincode = "1.3.3"
hex = { version = "0.4.3", features = ["serde"] }
thiserror = "1.0.0"
async-trait = "0.1.68"
futures = "0.3"
lazy_static = "1.4.0"
log = "0.4.0"
pretty_env_logger = "0.4.0"
parking_lot = "0.12.1"
dashmap = { version = "5.5.3", features = ["raw-api", "rayon"] }
tracing = "0.1.37"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
bytes = "1.5"
parity-scale-codec = { version = "3.0", features = ["derive"] }
wasmer = "4.0.0"
rand = "0.8.5"
rayon = "1.8"
ed25519-dalek = "2.0.0"
priority-queue = "1.3"
structopt = "0.3"
ctrlc = "3.2"
tempfile = "3.3"
sha2 = "0.10.6"
sha3 = "0.10.6"
signature = "2.1.0"
moka = { version = "0.12", features = ["sync"] }
crossbeam = "0.8"
once_cell = "1.19"
memmap2 = "0.9"
lru = "0.12"
num_cpus = "1.16"
anyhow = "1.0"


# AI Integration
ollama-rs = "0.1.5"
reqwest = { version = "0.11", features = ["json"] }
tokio-tungstenite = "0.20.0"

# Caching
redis = { version = "0.23.0", features = ["tokio-comp"] }

# WASM Runtime
wasmtime = "14.0"

# Q-NarwhalKnight Integration
q-types = { path = "../q-types" }
q-dag-knight = { path = "../q-dag-knight" }
q-narwhal-core = { path = "../q-narwhal-core" }
q-robot-control = { path = "../q-robot-control" }
q-storage = { path = "../q-storage" }
uuid = "1.0"
chrono = { version = "0.4", features = ["serde"] }
bip39 = "2.0"
blake3 = { workspace = true }

# v3.7.4: Post-quantum cryptography for contract deployment signatures
pqcrypto-dilithium = { workspace = true }
pqcrypto-traits = { workspace = true }
serde_bytes = "0.11"

# For metrics (marked as optional)
prometheus = { version = "0.13.3", optional = true }

# Platform-specific dependencies
# RocksDB has Windows cross-compilation issues with MinGW
[target.'cfg(not(target_os = "windows"))'.dependencies]
rocksdb = { workspace = true }

[dev-dependencies]
proptest = "1.0"
test-case = "3.0"
tokio-test = "0.4"
wat = "1.0"
criterion = { version = "0.4", default-features = false }
mockall = "0.11"
wasmtime = "14.0"

[features]
default = ["ai", "cache"]
ai = []
cache = []
dynamic-allocation = []
fault-tolerance = []
metrics = ["prometheus"]

[[bench]]
name = "vm_benchmarks"
harness = false

[[bin]]
name = "dagknight"
path = "src/main.rs"