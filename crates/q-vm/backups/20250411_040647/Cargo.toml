[package]
name = "dagknight_vm"
version = "0.1.0"
edition = "2021"
authors = ["DAGKnight Team"]
description = "A virtual machine for DAGKnight blockchain with AI capabilities"
readme = "README.md"

[dependencies]
# Original dependencies
tokio = { version = "1.35.0", features = ["full", "rt-multi-thread"] }
rocksdb = { version = "0.20.1", features = ["multi-threaded-cf", "lz4", "zstd"] }
libp2p = { version = "0.53", features = ["tcp", "tokio", "noise", "yamux", "gossipsub", "identify", "ping", "kad", "dns", "mdns", "macros", "request-response"] }
serde = { version = "1.0", features = ["derive", "rc"] }
serde_json = "1.0"
serde-big-array = "0.4.0"
bincode = "1.3.3"
hex = { version = "0.4.3", features = ["serde"] }
thiserror = "1.0.0"
async-trait = "0.1.68"
futures = "0.3"
lazy_static = "1.4.0"
log = "0.4.0"
pretty_env_logger = "0.4.0"
blake3 = "1.3.3"
parking_lot = "0.12.1"
dashmap = { version = "5.5.3", features = ["raw-api", "rayon"] }
tracing = "0.1.37"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
bytes = "1.5"
parity-scale-codec = { version = "3.0", features = ["derive"] }
wasmer = "4.0.0"
rand = "0.8.5"
rayon = "1.8"
ed25519-dalek = "2.0.0"
priority-queue = "1.3"
structopt = "0.3"
ctrlc = "3.2"
tempfile = "3.3"
sha2 = "0.10.6"
signature = "2.1.0"
moka = { version = "0.12", features = ["sync"] }
crossbeam = "0.8"
once_cell = "1.19"
memmap2 = "0.9"
lru = "0.12"
num_cpus = "1.16"

# AI Integration
ollama-rs = "0.1.5"
reqwest = { version = "0.11", features = ["json"] }
tokio-tungstenite = "0.20.0"

# Caching
redis = { version = "0.23.0", features = ["tokio-comp"] }

# For testing (marked as optional)
criterion = { version = "0.4", optional = true }
mockall = { version = "0.11.3", optional = true }
prometheus = { version = "0.13.3", optional = true }

[dev-dependencies]
proptest = "1.0"
test-case = "3.0"
tokio-test = "0.4"
wat = "1.0"
criterion = "0.4"
mockall = "0.11"

[features]
default = ["ai", "cache"]
ai = []
cache = []
dynamic-allocation = []
fault-tolerance = []
metrics = ["prometheus"]
testing = ["criterion", "mockall"]

[[bench]]
name = "vm_benchmarks"
harness = false

[[bin]]
name = "dagknight"
path = "src/main.rs"