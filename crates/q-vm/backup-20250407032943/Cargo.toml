[package]
name = "dagknight_vm"
version = "0.1.0"
edition = "2021"
authors = ["DAGKnight Team"]
description = "A virtual machine for DAGKnight blockchain"
readme = "README.md"

[dependencies]
tokio = { version = "1.35.0", features = ["full", "rt-multi-thread"] }
rocksdb = { version = "0.20.1", features = ["multi-threaded-cf", "lz4", "zstd"] }
libp2p = { version = "0.53", features = ["tcp", "tokio", "noise", "yamux", "gossipsub", "identify", "ping", "kad", "dns", "mdns", "macros", "request-response"] }
serde = { version = "1.0", features = ["derive", "rc"] }
serde_json = "1.0"
serde-big-array = "0.4.0"
bincode = "1.3.3"
hex = { version = "0.4.3", features = ["serde"] }
thiserror = "1.0.0"
async-trait = "0.1.0"
futures = "0.3.0"
lazy_static = "1.4.0"
log = "0.4.0"
pretty_env_logger = "0.4.0"
blake3 = "1.3.3"
parking_lot = "0.12.1"
dashmap = "5.5.3"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
bytes = "1.0"
parity-scale-codec = { version = "3.0", features = ["derive"] }
wasmer = "4.0.0"
rand = "0.8"
rayon = "1.5"
ed25519-dalek = { version = "2.0.0", features = ["rand_core"] }
priority-queue = "1.3"
structopt = "0.3"
ctrlc = "3.2"
tempfile = "3.3"
sha2 = "0.10"
signature = "2.1.0"

[dev-dependencies]
criterion = "0.4"
proptest = "1.0"
mockall = "0.11"
test-case = "3.0"
tokio-test = "0.4"
wat = "1.0"

[[bench]]
name = "vm_benchmarks"
harness = false
