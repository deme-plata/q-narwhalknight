[package]
name = "q-eternal-cypher"
version.workspace = true
edition.workspace = true
description = "Unified cryptographic framework with provenance-tracked keys, height-gated algorithm selection, AEGIS-256 encryption, KEM, ZK proofs, and eternal signature lineage"
license.workspace = true
authors.workspace = true

[dependencies]
# Workspace dependencies
serde = { workspace = true }
serde_json = { workspace = true }
blake3 = { workspace = true }
ed25519-dalek = { workspace = true, features = ["rand_core"] }
rand = { workspace = true }
thiserror = { workspace = true }

# Sibling crate: advanced crypto primitives (FROST, SQIsign, AEGIS, Bulletproofs, Circle STARKs)
q-crypto-advanced = { path = "../q-crypto-advanced", features = ["frost", "sqisign"] }
# Core types for blockchain height references
q-types = { path = "../q-types" }

[dev-dependencies]
# ed25519-dalek 2.x uses rand_core 0.6, need matching OsRng for tests
rand_core = { version = "0.6", features = ["getrandom"] }
