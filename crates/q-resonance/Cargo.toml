[package]
name = "q-resonance"
version.workspace = true
edition.workspace = true
description.workspace = true
homepage.workspace = true
repository.workspace = true
keywords.workspace = true
categories.workspace = true
license.workspace = true
rust-version.workspace = true
authors.workspace = true

[dependencies]
# Local dependencies
q-types = { path = "../q-types" }
q-dag-knight = { path = "../q-dag-knight" }
q-narwhal-core = { path = "../q-narwhal-core" }
q-aegis-ql = { path = "../q-aegis-ql" }

# Core numerical computation
num-complex = "0.4"
ndarray = { version = "0.15", features = ["rayon"] }

# Parallel processing
rayon = "1.10"

# Cryptographic primitives
sha3 = "0.10"
blake3 = "1.3.3"
hex = "0.4"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
bincode = "1.3"

# Concurrent data structures
dashmap = "6.1"
parking_lot = "0.12"

# Error handling
thiserror = "1.0"
anyhow = "1.0"

# Logging
tracing = "0.1"

# Async runtime
tokio = { version = "1.0", features = ["full"] }

# Random number generation
rand = "0.8"

# Performance optimization
simd-json = { version = "0.13", optional = true }

# GPU acceleration (optional)
cudarc = { version = "0.9", optional = true }

[target.'cfg(not(target_os = "windows"))'.dependencies]
ndarray-linalg = { version = "0.16", features = ["openblas-static"] }

[target.'cfg(target_os = "windows")'.dependencies]
ndarray-linalg = { version = "0.16", features = ["intel-mkl-static"] }

[dev-dependencies]
criterion = { version = "0.5", default-features = false, features = ["cargo_bench_support"] }
proptest = "1.4"
tokio = { version = "1.35", features = ["full", "test-util"] }
rand = "0.8"

[features]
default = []
gpu = ["cudarc"]
simd = ["simd-json"]
