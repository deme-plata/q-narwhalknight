[package]
name = "q-governance"
version = "0.1.0"
edition = "2021"
authors = ["Q-NarwhalKnight Team"]
description = "Proof-of-Contribution Governance with Mining-Weighted Voting"
license = "MIT"

[dependencies]
# Core dependencies
anyhow = "1.0"
thiserror = "1.0"
tokio = { version = "1.35", features = ["full"] }
async-trait = "0.1"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
bincode = "1.3"

# Cryptography
sha3 = "0.10"
hex = "0.4"

# Time
chrono = "0.4"

# Logging
tracing = "0.1"

# Internal dependencies
q-types = { path = "../q-types" }
q-storage = { path = "../q-storage" }
q-mining = { path = "../q-mining" }

[dev-dependencies]
tokio-test = "0.4"
