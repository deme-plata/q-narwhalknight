[package]
name = "q-tui"
version = "0.0.7"
edition = "2021"
authors = ["Q-NarwhalKnight Team"]
description = "Beautiful terminal UI for Q-NarwhalKnight node"
license = "Apache-2.0"

[dependencies]
# TUI framework
ratatui = "0.25"
crossterm = "0.27"

# Async runtime
tokio = { version = "1.35", features = ["full"] }

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "registry"] }

# Utilities
chrono = "0.4"
anyhow = "1.0"
serde = { version = "1.0", features = ["derive"] }

# Circular buffer for logs
ringbuf = "0.3"

# Privacy-preserving log redaction
q-log-privacy = { path = "../q-log-privacy" }

# HTTP client for bounty API
reqwest = { version = "0.11", features = ["json"] }
serde_json = "1.0"

# QR code generation for wallet view
qrcode = "0.14"
