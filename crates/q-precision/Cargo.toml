[package]
name = "q-precision"
version = "0.1.0"
edition = "2021"
description = "Ultra-precision monetary arithmetic for Q-NarwhalKnight - 36-decimal quantum-safe precision"
authors = ["Claude Code Server Beta <claude-beta@anthropic.com>"]
license = "MIT"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
thiserror = "1.0"
num-bigint = { version = "0.4", features = ["serde"] }
num-traits = "0.2"
rust_decimal = { version = "1.32", features = ["serde-with-str"] }

# Quantum randomness for tie-breaking
rand = "0.8"
rand_chacha = "0.3"
getrandom = { version = "0.2", features = ["std"] }

# Performance benchmarking
criterion = { version = "0.5", optional = true, default-features = false, features = ["cargo_bench_support"] }

[features]
default = ["quantum-rounding"]
quantum-rounding = []
benchmarks = ["criterion"]

[dev-dependencies]
criterion = { version = "0.5", default-features = false, features = ["cargo_bench_support"] }
proptest = "1.0"

[[bench]]
name = "precision_bench"
harness = false

