[package]
name = "q-plugin-system"
version = "0.1.0"
edition = "2021"
description = "Comprehensive plugin system for Q-NarwhalKnight quantum consensus VM"

[dependencies]
# Core async runtime
tokio = { version = "1.0", features = ["full"] }
async-trait = "0.1"
futures = "0.3"

# Serialization
serde = { version = "1.0", features = ["derive"] }
bincode = "1.3"
serde_json = "1.0"

# Error handling
anyhow = "1.0"
thiserror = "1.0"

# Cryptography and hashing
blake3 = "1.0"
hex = "0.4"
sha3 = "0.10"
ed25519-dalek = { version = "2.1", features = ["rand_core"] }

# Database (platform-specific - RocksDB on Linux, sled on Windows)

# Logging
tracing = "0.1"

# Time handling
chrono = { version = "0.4", features = ["serde"] }

# UUID generation
uuid = { version = "1.0", features = ["v4", "serde"] }

# Q-NarwhalKnight dependencies
q-vm = { path = "../q-vm" }
q-narwhal-core = { path = "../q-narwhal-core" }
q-types = { path = "../q-types" }

[target.'cfg(not(target_os = "windows"))'.dependencies]
rocksdb = { workspace = true }

[target.'cfg(target_os = "windows")'.dependencies]
sled = "0.34"

[dev-dependencies]
tokio-test = "0.4"
tempfile = "3.8"

[features]
default = ["full"]
full = ["vm-bridge", "state-manager", "consensus-context", "transaction-processor"]
vm-bridge = []
state-manager = []
consensus-context = []
transaction-processor = []