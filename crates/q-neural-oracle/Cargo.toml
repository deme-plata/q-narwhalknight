[package]
name = "q-neural-oracle"
version = "0.1.0"
edition = "2021"
authors = ["Q-NarwhalKnight Team"]
description = "Quantum Neural Oracle - Decentralized ML prediction infrastructure"
license = "MIT"

[dependencies]
# Async runtime
tokio = { version = "1.36", features = ["full"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
bincode = "1.3"

# Numerical computing
num-complex = "0.4"
nalgebra = "0.32"
rand = "0.8"
rand_distr = "0.4"
rand_chacha = "0.3"

# Cryptography
sha3 = "0.10"
blake3 = "1.5"

# Error handling
anyhow = "1.0"
thiserror = "1.0"

# Logging
tracing = "0.1"

# Parallel processing
rayon = "1.10"

# Collections
dashmap = "6.0"
parking_lot = "0.12"

# Time
chrono = { version = "0.4", features = ["serde"] }

# Internal dependencies
q-types = { path = "../q-types" }
q-storage = { path = "../q-storage" }

[dev-dependencies]
tokio-test = "0.4"
criterion = { version = "0.5", default-features = false, features = ["cargo_bench_support"] }

# Benchmark disabled until implemented
# [[bench]]
# name = "quantum_simulation"
# harness = false

[features]
default = []
gpu = []  # Future: GPU-accelerated quantum simulation
zkml = [] # Future: Zero-knowledge ML proofs
