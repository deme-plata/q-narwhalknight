[package]
name = "q-mining-pool"
version = "0.1.0"
edition = "2021"
description = "Mining pool implementation for Q-NarwhalKnight with Stratum V1/V2 support"
authors = ["Q-NarwhalKnight Team"]
license = "Apache-2.0"

[dependencies]
# Core dependencies
tokio = { version = "1.35", features = ["full", "sync", "net", "io-util", "time", "macros", "rt-multi-thread"] }
async-trait = "0.1"
futures = "0.3"
parking_lot = "0.12"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
bincode = "1.3"
serde-big-array = "0.5"

# Crypto
sha3 = "0.10"
blake3 = "1.5"
hex = "0.4"
rand = "0.8"

# Network
tokio-util = { version = "0.7", features = ["codec"] }
bytes = "1.5"

# Logging
tracing = "0.1"

# Time
chrono = { version = "0.4", features = ["serde"] }

# Error handling
anyhow = "1.0"
thiserror = "1.0"

# Data structures
dashmap = "5.5"
indexmap = "2.1"

# Database (optional, for persistence)
rocksdb = { version = "0.22", optional = true }

# Internal crates
q-types = { path = "../q-types" }
q-storage = { path = "../q-storage" }

[features]
default = []
persistence = ["rocksdb"]

[dev-dependencies]
tokio-test = "0.4"
