[package]
name = "q-higgs-hydro"
version = "0.1.0"
edition = "2021"
authors = ["Q-NarwhalKnight Team"]
description = "Higgs field manipulation for water-based quantum computation"

[dependencies]
# Core dependencies
anyhow = "1.0"
async-trait = "0.1"
tokio = { version = "1.47", features = ["full"] }
tracing = "0.1"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
bincode = "1.3"

# Cryptography
sha3 = "0.10"
blake3 = "1.5"
hex = "0.4"

# Mathematics and physics
nalgebra = "0.32"
num-complex = "0.4"
ndarray = "0.15"
statrs = { workspace = true }
rand = "0.8"
rand_distr = "0.4"

# Quantum integration
q-types = { path = "../q-types" }
q-quantum-rng = { path = "../q-quantum-rng" }
q-zk-snark = { path = "../q-zk-snark" }
q-robot-control = { path = "../q-robot-control" }

# Time precision
chrono = "0.4"

[dev-dependencies]
criterion = { version = "0.5", default-features = false, features = ["cargo_bench_support"] }
proptest = "1.4"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
futures = "0.3"