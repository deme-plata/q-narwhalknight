[package]
name = "q-flux"
version.workspace = true
edition.workspace = true
description = "High-performance reverse proxy for Q-NarwhalKnight — worker-per-core TLS termination"
license.workspace = true

[[bin]]
name = "q-flux"
path = "src/main.rs"

[dependencies]
tokio = { workspace = true, features = ["full", "signal", "sync", "time", "io-util", "net", "rt-multi-thread"] }
rustls = { workspace = true }
tokio-rustls = { workspace = true }
rustls-pemfile = { workspace = true }
hyper = { workspace = true, features = ["server", "http1", "http2"] }
hyper-util = { workspace = true, features = ["tokio", "http2"] }
http-body-util = { workspace = true }
http = { workspace = true }
bytes = { workspace = true }
httparse = { workspace = true }
dashmap = { workspace = true }
futures = { workspace = true }
parking_lot = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
serde = { workspace = true }
toml = { workspace = true }
anyhow = { workspace = true }
socket2 = { workspace = true }
num_cpus = { workspace = true }
clap = { workspace = true }
libc = { workspace = true }
ratatui = { workspace = true }
crossterm = { workspace = true }
quinn = { version = "0.11", optional = true }
x509-parser = { workspace = true }
sha2 = { workspace = true }
reqwest = { workspace = true }
serde_json = { workspace = true }
flate2 = "1"
brotli = "7"

# Phase 2: io_uring (Linux only)
[target.'cfg(target_os = "linux")'.dependencies]
io-uring = "0.7"

[dev-dependencies]
criterion = { workspace = true }

[features]
quic = ["dep:quinn"]

[[bench]]
name = "flux_bench"
harness = false
