# q-flux configuration for Epsilon (89.149.241.126)
# Replaces Pingap — serves quillon.xyz

[server]
listen = ["0.0.0.0:443", "0.0.0.0:80"]
workers = 0  # auto-detect (48 cores on Epsilon)
admin_listen = "127.0.0.1:9090"

[tls]
cert = "/etc/letsencrypt/live/quillon.xyz/fullchain.pem"
key = "/etc/letsencrypt/live/quillon.xyz/privkey.pem"

[upstream]
backends = ["127.0.0.1:8080"]
max_conns_per_worker = 32
keepalive_timeout = "30s"
connect_timeout = "3s"
response_timeout = "120s"
health_check_interval = "2s"
health_check_path = "/api/v1/status"
health_check_timeout = "3s"
failure_threshold = 1
healthy_threshold = 1

[limits]
max_connections = 200000
max_conns_per_ip = 100
request_body_limit = 26214400  # 25MB

# Super-cluster: if local q-api-server goes down, route to Beta or Delta
[cluster]
peers = [
    "185.182.185.227:8080",  # Beta (bootstrap node)
    "5.79.79.158:8080",      # Delta (secondary node)
]
health_check_interval = "5s"

[logging]
level = "info"

[static_files]
root = "/home/orobit/q-narwhalknight/dist-final"
spa_fallback = true
