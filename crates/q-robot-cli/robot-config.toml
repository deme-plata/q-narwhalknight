# Quantum Water Robot Control Configuration
# Generated example configuration for Q-NarwhalKnight robot CLI

[network]
listen_addresses = ["/ip4/0.0.0.0/tcp/0", "/ip6/::/tcp/0"]
bootstrap_nodes = [
    "/ip4/192.168.1.1/tcp/4001/p2p/12D3KooWExample1", 
    "/ip4/192.168.1.2/tcp/4001/p2p/12D3KooWExample2"
]
max_connections = 100
connection_timeout = 30
quantum_secure = true

[quantum]
enable_qrng = true
coherence_monitor_interval = 1.0

[quantum.entanglement]
auto_establish = true
target_fidelity = 0.9
decoherence_threshold = 0.1
bell_state_type = "PhiPlus"

[quantum.visualization]
enable_realtime = true
update_frequency = 10.0
color_scheme = "rainbow"
export_format = "json"

[security.post_quantum]
enable_signatures = true
signature_algorithm = "Dilithium5"
enable_key_exchange = true
key_exchange_algorithm = "Kyber1024"
hybrid_mode = true

[security.authentication]
method = "certificate"
credential_path = "./certs/robot-client.pem"
token_refresh_interval = 3600
enable_mfa = false

[security.access_control]
admin_users = ["claude"]
operator_users = ["operator"]
readonly_users = ["observer"]

[security.access_control.permissions]
robot_control = "admin,operator"
swarm_control = "admin,operator"
quantum_measure = "admin,operator,readonly"
system_config = "admin"

[logging]
level = "debug"
format = "text"
console = true
metrics = true

