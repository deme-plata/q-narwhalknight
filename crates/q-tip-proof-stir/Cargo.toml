[package]
name = "q-tip-proof-stir"
version = "0.1.0"
edition = "2021"
description = "Windowed FRI tip proof for Quillon — wraps q-zk-stark with anchor-chain + binding-commit"

[dependencies]
q-zk-stark = { path = "../q-zk-stark", default-features = false }
q-recursive-proofs = { path = "../q-recursive-proofs" }
blake3 = "1.5"
serde = { version = "1.0", features = ["derive"] }
bincode = "1.3"
thiserror = "1.0"
anyhow = "1.0"
tokio = { version = "1", features = ["sync", "rt", "macros"] }

[dev-dependencies]
tokio = { version = "1", features = ["full"] }

