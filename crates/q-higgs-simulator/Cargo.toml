[package]
name = "q-higgs-simulator"
version = "0.1.0"
edition = "2021"
authors = ["Q-NarwhalKnight Team"]
description = "3D Higgs field simulation with attosecond laser interaction"

[dependencies]
# Core async and error handling
anyhow = "1.0"
async-trait = "0.1"
tokio = { version = "1.47", features = ["full"] }
tracing = "0.1"

# Mathematics and physics
nalgebra = "0.32"
ndarray = { version = "0.15", features = ["rayon"] }
num-complex = "0.4"
statrs = { workspace = true }
rand = "0.8"
rand_distr = "0.4"

# Parallel processing (optimized for 18-core CPU)
rayon = "1.10"

# Serialization for field export
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
bincode = "1.3"

# Visualization output (VTK format)
vtkio = "0.6"

# Performance profiling
criterion = { version = "0.5", optional = true, default-features = false, features = ["cargo_bench_support"] }

# Integration with other q-narwhalknight components
q-types = { path = "../q-types" }
q-quantum-rng = { path = "../q-quantum-rng" }

[dev-dependencies]
criterion = { version = "0.5", default-features = false, features = ["cargo_bench_support"] }
proptest = "1.4"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tempfile = "3.8"

[features]
default = []
benchmarks = ["criterion"]
