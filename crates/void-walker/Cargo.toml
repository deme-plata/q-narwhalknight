[package]
name = "void-walker"
version = "0.3.0"
edition = "2021"
description = "🌌 Aqua-K-Atto: Attosecond laser-Tor analytics species for quantum water robots"

[dependencies]
rand = "0.8"
rand_distr = "0.4"
sha3 = "0.10"
blake3 = "1.5"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
anyhow = "1.0"
tokio = { version = "1.0", features = ["full"] }
clap = { version = "4.5", features = ["derive"] }
pqcrypto-dilithium = "0.5"
pqcrypto-kyber = "0.7"
tokio-socks = "0.5"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
uuid = { version = "1.0", features = ["v4"] }
hex = "0.4"

# Q-NarwhalKnight integration
q-types = { path = "../q-types" }
q-tor-client = { path = "../q-tor-client" }

[dev-dependencies]
tokio-test = "0.4"

[[bin]]
name = "aqua_k_atto"
path = "src/bin/aqua_k_atto.rs"