[package]
name = "q-lattice-guard"
version = "0.1.0"
edition = "2021"
authors = ["Q-NarwhalKnight Team"]
description = "LatticeGuard: A Novel Lattice-Based Post-Quantum zk-SNARK"
license = "MIT"
readme = "README.md"

[features]
default = ["parallel"]
parallel = ["rayon"]
gpu = []  # Future GPU acceleration
benchmarks = ["dep:criterion"]

[dependencies]
# Core dependencies
anyhow = { workspace = true }
thiserror = "1.0"
serde = { version = "1.0", features = ["derive"] }
bincode = "1.3"

# Cryptographic foundations
sha3 = "0.10"
blake3 = "1.5"
rand = "0.8"
rand_core = "0.6"
rand_chacha = "0.3"

# Number theory and NTT
num-bigint = "0.4"
num-traits = "0.2"
num-integer = "0.1"

# Parallel processing
rayon = { version = "1.10", optional = true }

# Benchmarking (optional, enabled via benchmarks feature)
criterion = { version = "0.5", optional = true, default-features = false, features = ["cargo_bench_support"] }

# Lattice crypto primitives (will use when available)
# For now, implementing core primitives manually
# concrete-nttf = "0.5"  # Future: when crate matures

# Tracing
tracing = { workspace = true }

# Testing
[dev-dependencies]
proptest = "1.4"

[[bench]]
name = "lattice_guard_bench"
harness = false
required-features = ["benchmarks"]
