[package]
name = "q-ivc-verifier-wasm"
version = "0.1.0"
edition = "2021"
description = "WASM-bindgen wrapper for the Quillon Graph recursive proof verifier (browser wallets). Phase 1 ships a placeholder; Phase 2 swaps in real Nova/BN254 verification."
license = "Apache-2.0"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = "0.2"
js-sys = "0.3"
web-sys = { version = "0.3", features = ["console", "Performance", "Window"] }
hex = "0.4"

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"
strip = true

[lints.rust]
unsafe_code = "forbid"
