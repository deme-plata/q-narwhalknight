[package]
name = "q-recursive-proofs"
version = "0.1.0"
edition = "2021"
authors = ["Q-NarwhalKnight Team"]
description = "Post-Quantum Recursive SNARKs for Eliminating Weak Subjectivity"
license = "MIT"
readme = "README.md"

[features]
default = ["parallel"]
parallel = ["rayon"]
gpu = []  # Future GPU acceleration
benchmarks = ["dep:criterion"]

[dependencies]
# Core Q-NarwhalKnight crates
q-lattice-guard = { path = "../q-lattice-guard" }
q-types = { path = "../q-types" }

# Core dependencies
anyhow = { workspace = true }
thiserror = "1.0"
serde = { version = "1.0", features = ["derive"] }
bincode = "1.3"
bytes = "1.5"

# Cryptographic foundations
sha3 = "0.10"
blake3 = "1.5"
rand = "0.8"
rand_core = "0.6"
rand_chacha = "0.3"

# Number theory
num-bigint = "0.4"
num-traits = "0.2"
num-integer = "0.1"

# Parallel processing
rayon = { version = "1.10", optional = true }
num_cpus = "1.16"

# Async runtime
tokio = { workspace = true, features = ["full", "sync"] }
futures = "0.3"

# libp2p for decentralized proving
libp2p = { workspace = true }

# Serialization
rmp-serde = "1.1"

# Tracing
tracing = { workspace = true }

# Benchmarking
criterion = { version = "0.5", optional = true, default-features = false, features = ["cargo_bench_support"] }

[dev-dependencies]
proptest = "1.4"
tokio-test = "0.4"

[[bench]]
name = "recursive_proof_bench"
harness = false
required-features = ["benchmarks"]
