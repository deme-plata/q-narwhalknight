[package]
name = "q-temporal-shield"
version = "0.1.0"
edition = "2021"
authors = ["Q-NarwhalKnight Research Division"]
license = "Apache-2.0"
description = "TemporalShield with zk-STARK: Information-theoretic encryption with post-quantum secure zero-knowledge proofs and NO trusted setup"
repository = "https://github.com/q-narwhalknight/temporal-shield"
keywords = ["cryptography", "post-quantum", "zero-knowledge", "stark", "shamir"]
categories = ["cryptography", "no-std"]

[features]
default = ["std", "parallel"]
std = ["winter-math/std", "winter-air/std", "blake3/std"]
parallel = ["rayon", "winter-prover/concurrent"]

[dependencies]
# STARK proof system (Winterfell)
winter-air = "0.10"
winter-math = "0.10"
winter-prover = "0.10"
winter-verifier = "0.10"
winter-utils = "0.10"
winter-crypto = "0.10"
winter-rand-utils = "0.10"

# Core cryptography
blake3 = { version = "1.5", default-features = false }
chacha20poly1305 = { version = "0.10", default-features = false, features = ["alloc"] }
sha3 = "0.10"

# Post-quantum cryptography
pqcrypto-kyber = "0.8"
pqcrypto-dilithium = "0.5"
pqcrypto-traits = "0.3"

# Field arithmetic
num-bigint = { version = "0.4", default-features = false }
num-traits = { version = "0.2", default-features = false }
num-integer = { version = "0.1", default-features = false }

# Serialization
serde = { version = "1.0", features = ["derive"] }
bincode = "1.3"
hex = { version = "0.4", default-features = false, features = ["alloc"] }

# Utilities
lazy_static = "1.4"
thiserror = "1.0"
rand = { version = "0.8", default-features = false }
rand_chacha = "0.3"
getrandom = { version = "0.2", features = ["std"] }
rayon = { version = "1.10", optional = true }
log = "0.4"
zeroize = { version = "1.7", features = ["derive"] }

[dev-dependencies]
criterion = { version = "0.5", default-features = false, features = ["cargo_bench_support"] }
proptest = "1.4"
test-case = "3.3"
tempfile = "3.10"

[[bench]]
name = "temporal_shield"
harness = false
