[package]
name = "q-index-fund"
version = "1.0.0"
edition = "2021"
description = "QNK-INDEX: Decentralized Top Token Index Fund for Q-NarwhalKnight"
authors = ["Q-NarwhalKnight Team"]
license = "MIT"

[dependencies]
# Core
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
bincode = "1.3"
thiserror = "1.0"
anyhow = "1.0"

# Async
tokio = { version = "1.0", features = ["full"] }
async-trait = "0.1"
futures = "0.3"

# Crypto - Post-Quantum
pqcrypto-dilithium = "0.5"
pqcrypto-traits = "0.3"
sha3 = "0.10"
blake3 = "1.5"
hex = "0.4"

# Data structures
dashmap = "5.5"
lru = "0.12"

# Logging
tracing = "0.1"

# Types
q-types = { path = "../q-types" }
q-storage = { path = "../q-storage" }

[dev-dependencies]
tokio-test = "0.4"

[features]
default = []
governance = []
