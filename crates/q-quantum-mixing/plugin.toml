ring_signatures = true
zero_knowledge_proofs = true
temporal_mixing = true
cross_chain_mixing = true

[security]
quantum_noise_injection = true
quantum_decoy_transactions = true
"""

# Plugin versioning and update information
[plugin.updates]
auto_update = false
update_channel = "stable"
update_check_url = "https://api.orobit.xyz/plugins/quantum-mixing/updates"
changelog_url = "https://github.com/orobit-chimera/quantum-mixing-plugin/blob/main/CHANGELOG.md"

# Installation and setup requirements
[plugin.installation]
pre_install_script = "scripts/pre_install.sh"
post_install_script = "scripts/post_install.sh"
system_requirements = [
    "Orobit Chimera v0.9.9+",
    "Quantum Crypto Plugin v1.0.0+",
    "RAM >= 2GB",
    "CPU with 2+ cores",
    "Network connectivity for P2P mixing"
]
optional_requirements = [
