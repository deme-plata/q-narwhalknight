# Example configurations for different use cases
[plugin.examples]
# Quick privacy mixing
[plugin.examples.quick_mix]
description = "Fast 1-10 second mixing for immediate privacy"
config = """
[mixing]
min_mixing_duration_seconds = 1
max_mixing_duration_seconds = 10
default_mixing_duration_seconds = 5

[performance]
optimize_for_speed = true
optimize_for_privacy = false

[privacy]
stealth_addresses = true
ring_signatures = false
zero_knowledge_proofs = false
temporal_mixing = false
"""

# Standard privacy mixing
[plugin.examples.standard_mix]
description = "Balanced privacy and performance mixing"
config = """
[mixing]
min_mixing_duration_seconds = 10
max_mixing_duration_seconds = 300
default_mixing_duration_seconds = 60

[performance]
optimize_for_speed = false
optimize_for_privacy = true

[privacy]
stealth_addresses = true
ring_signatures = true
zero_knowledge_proofs = true
temporal_mixing = true
"""

# Maximum privacy mixing (Premium)
[plugin.examples.maximum_privacy]
description = "Maximum privacy with all premium features"
