subcategory = "Transaction Mixing"
pricing_model = "freemium"  # Free basic features, premium for 5 ORB
support_level = "commercial"
maturity_level = "stable"

# Features highlights
key_features = [
    "1-10 second quantum mixing",
    "Configurable mixing duration",
    "Premium features for 5 ORB",
    "Quantum-enhanced privacy",
    "Stealth addresses",
    "Ring signatures",
    "Zero-knowledge proofs",
    "Temporal transaction spreading",
    "Decoy transaction generation",
    "Quantum noise injection"
]

