[package]
name = "q-monero-bridge"
version = "0.2.0"
edition = "2021"
authors = ["Server Beta <server-beta@q-narwhalknight.dev>"]
description = "🔒⚡ Monero XMR Atomic Swap Relay - Stealth cross-chain swaps via Tor"
license = "MIT"

[dependencies]
# Core async runtime
tokio = { workspace = true, features = ["full"] }
anyhow = { workspace = true }
thiserror = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
tracing = { workspace = true }

# Tor integration
tokio-socks = { workspace = true }

# Cryptography for atomic swaps
ring = { workspace = true }
sha3 = { workspace = true }
blake3 = { workspace = true }
hex = { workspace = true }
base64 = "0.22"

# HTTP client with Tor support
reqwest = { version = "0.11", features = ["json", "socks"] }

# Monero-specific cryptography
curve25519-dalek = "4.1"
ed25519-dalek = "2.1"
sha2 = "0.10"

# Time-lock contracts
generic-array = "0.14"

# Q-NarwhalKnight internal
q-types = { path = "../q-types" }
q-tor-client = { path = "../q-tor-client" }
q-network = { path = "../q-network" }

[dev-dependencies]
tokio-test = "0.4"
proptest = { workspace = true }

[features]
default = ["stealth-relay", "atomic-swaps", "tor-integration"]
stealth-relay = []
atomic-swaps = []
tor-integration = []