[package]
name = "q-rlwe-vrf"
version = "0.1.0"
edition = "2021"
authors = ["Q-NarwhalKnight Team"]
description = "Post-Quantum Verifiable Random Function based on Ring-LWE"
license = "MIT"

[features]
default = ["parallel"]
parallel = ["rayon"]

[dependencies]
# Core dependencies
anyhow = { workspace = true }
thiserror = "1.0"
serde = { version = "1.0", features = ["derive"] }
bincode = "1.3"

# Cryptographic foundations
sha3 = "0.10"
blake3 = "1.5"
rand = "0.8"
rand_core = "0.6"
rand_chacha = "0.3"

# Number theory
num-bigint = "0.4"
num-traits = "0.2"

# Parallel processing
rayon = { version = "1.10", optional = true }

# Tracing
tracing = { workspace = true }

[dev-dependencies]
criterion = { version = "0.5", default-features = false, features = ["cargo_bench_support"] }
proptest = "1.4"
