[workspace.package]
version = "10.9.58"  # v10.9.58: security cherry-picks — PR #66 (save_wallet_balance max-wins, CLAUDE.md Rule 1), #67 (AEGIS local-admin fail-closed), #68 (ProductionMempool real validation)
