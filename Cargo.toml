version = "10.9.55"  # v10.9.55: CONSENSUS HARDENING — three pre-20M-activation fixes from Codex review (2026-05-17). (C1) `crates/q-api-server/src/main.rs:~12507` BalanceRootV1 enforcement now FAIL-CLOSED on local root-computation error: pre-v10.9.55 mapped storage errors to [0u8;32] and then ACCEPTED when local==[0u8;32], a consensus-split surface where a transient DB failure on one node would let it accept unverifiable post-20M blocks while healthy peers used real consensus. Now rejects and surfaces the storage problem. (C2) `crates/q-storage/src/balance_smt.rs:~113` SMT node_key collision fix: pre-v10.9.55 `node_key(depth=254, addr)` produced 33-byte keys starting with 0xFE (depth-254 as u8 = 0xFE), and `node_key(depth=256, addr)` (leaf) also produced 33-byte keys starting with 0xFE. For any address with low 2 bits = 00 (~25% of all addresses), the two keys were byte-identical → silently collided in RocksDB. At BalanceRootV2 activation that meant ~25% of SMT proofs would be nondeterministic across nodes; at 100M-wallet scale ~25M broken proofs. Fix uses explicit domain bytes (b'N' for internal nodes with u16-BE depth header, b'L' for leaves) — distinct namespaces, can never collide. (C3+H4) `crates/q-storage/src/balance_smt.rs:~270` rebuild_from_balances now (1) truncates the SMT CF before rebuild via delete_range_cf so apply_to_batch_internal cannot fold stale prior-shadow-rebuild nodes into the new root, and (2) sorts updates by address before apply so HashMap iteration order can never affect the root. Both eliminate cross-node determinism hazards at V2 activation. ALSO `crates/q-storage/src/kv.rs:~745` CF_BLOCKS gains `set_force_consistency_checks(true)` — defense-in-depth catching MANIFEST↔SST divergence at DB open time, which is exactly the kill-9-during-compaction loss pattern that destroyed pre-7M historical blocks on Epsilon in March 2026. Companion doc `docs/technical-review-sparse-chain-truth-v1.md` documents the sparse-chain reality (DAG-Knight legitimately produces blocks at ~93-96% of heights post-15M; pre-7M heavy historical damage from compaction+v10.2.8-cleanup is sunk cost). DEFERRED to a follow-up release: sync-layer range-fetch + sparse-accept refactor (substantial code, needs a focused session), in-memory present-heights bitmap (perf), and systemd KillMode=mixed hardening (per-server config push). # v10.9.54: DELTA BOOTSTRAP PEER ID REFRESH — replaced hardcoded Delta peer `12D3KooWLJJRvqo6mBoHLpgxVbGKfW3Jv39ziU4kz1adKFv93JbK` (lost when zombie process generated a fresh identity during May 13–17 outage) with the live Delta v10.9.52 peer ID `12D3KooWPg1GsUhYtZdzN37NcLQCz2PXJ3GssKMtELwvMvHFrjTt`. 5 files (q-network/unified_network_manager.rs, q-api-server/main.rs ×2, q-miner/p2p_network.rs, q-types/lib.rs, CLAUDE.md). Required so other nodes auto-dial Delta on boot. Bundles v10.9.53 NODE TUI OVERHAUL — (a) removed Top Movers card + backing ring-buffer (private chain, low signal); saved ~290KB and per-tick RocksDB scan. (b) Added TRUSTLESS BOOTSTRAP PROOF card showing live tip-proof telemetry (scheme, anchor→tip, step_count, wire size, last verify µs against 10ms target) with cycling quantum glyph. (c) Added MINE TO THIS NODE info card showing endpoint URL, reward/block, recent credits/hr, q-miner wget+run hints. (d) Fixed render_recent_logs: log messages now sanitized (strip ANSI CSI, control chars, newlines; truncate to terminal width with ellipsis) — kills the after-uptime layout warping at bottom of dashboard. 4 files, net -75 LOC. # v10.9.52: CRITICAL DEX FIX — add_liquidity::pool_lookup no longer gates on `pool.provider == provider`. Previous code returned None when a non-creator wallet attempted to add to an existing pool, falling through to `pools.insert(new_pool_id, pool)` which SILENTLY OVERWROTE the entire pool with the new caller's amounts as the initial reserves. Discovered 2026-05-17 when agent wallet's MOON LP add destroyed FOUNDER's 97 QUG + 245M MOON in pool-90fec676…. Fix: any wallet may LP into an existing pool; per-LP shares already tracked via generate_lp_token_address(pool_id) credits in token_balances. One file, ~13 LOC. # v10.9.51: TIP-PROOF HARDENING + PERSISTENCE. (1) Closes DeepSeek §8 — LatticeTipProof gains step_count field, folded into commit() and verified equal to tip-anchor; prevents transcript-length forgery. proof_version bumped 'tip-blake3-fs-v1' → 'tip-blake3-fs-v1.1'; wire format 176 → 184 bytes. (2) Producer-hook now persists proof to CF_MANIFEST every 1000 extends + resumes on boot — kills the 18s cold-start warmup walk through 18M blocks. 4 files, ~227 LOC. Sprint crispy-marinating-hummingbird, closes GitHub issues #73 and #74. All v10.9.50 fixes carry forward (MAX_FORWARD_SKIP 1K, three zero-config defaults). # v10.9.50: ZERO-CONFIG SYNC. Three opinionated defaults flip ON for ./q-api-server stand-alone invocation: Q_GAP_TRUST_SINGLE_PEER=1 (autonomous heal accepts single-peer declarations), Q_GENESIS_SYNC_ONLY=1 (10K lookahead window cap), Q_SKIP_CHECKPOINT=1 (bypass checkpoint trust). Operator can disable any with =0. Triggered by v10.9.49 user report: fresh sync wedged at h=26K because Q_GAP_TRUST_SINGLE_PEER was missing from their env-var invocation (backslash line-continuation ate it). Now users don't need to set anything. ALSO lowers MAX_FORWARD_SKIP 10K → 1K in unified_network_manager.rs so SMALL gaps (~600 blocks) trigger permanent_gap declaration — fixes v10.9.49 canary stall at h=1,390,043 where Beta's forward-seek skipped only 657 blocks (under old 10K threshold). All v10.9.49 features (autonomous gap heal, BIP39 server validation, send_transaction_signed, airdrop AuthenticatedWallet gate, 8 Prometheus science gauges) carry forward unchanged. # v10.9.49: AGENTIC MONEY SECURITY — (A) NEW POST /api/v1/transactions/send_signed accepting X-Wallet-Auth only (no mnemonic, no vault); mirrors /dex/swap pattern so client-managed wallets (raw 32-byte seeds, not BIP39) can natively send QUG/QUGUSD/custom-token transfers from MCP. Existing /transactions/send untouched. (B) /api/v1/contracts/airdrop NOW REQUIRES AuthenticatedWallet + verifies caller == contract.deployer + 1000-recipient/call cap. CRITICAL SECURITY FIX: pre-v10.9.49 anyone could call airdrop on any deployed contract with zero auth — found 2026-05-17 while building agentic-money primitives. Carries v10.9.48: AUTONOMOUS GAP HEAL — kills the operator-facing Q_KNOWN_PERMANENT_GAPS env var by making detection fully autonomous. Builds on v10.9.46's correct condition fix at turbo_sync.rs:6904 (verified live on canary 15:09 UTC: contiguous 26000 → 100440, skipped 74453 blocks, counter qnk_known_gap_advances_total=1). Pieces: (1) NetworkManager.gap_advance_tx now a pure relay carrying (start, end, PeerId) — quorum/policy moved to TurboSync; new set_gap_advance_tx() setter. (2) TurboSync gains spawn_gap_advance_handler() task that applies multi-signal accept policy: `unique_reporters >= 2 OR (>= 1 AND beta_score >= Q_GAP_TRUST_THRESHOLD default 0.8) OR Q_GAP_TRUST_SINGLE_PEER=1`. (3) Accepted gaps persisted to RocksDB CF_MANIFEST via new QStorage::persist_permanent_gap()/load_permanent_gaps() — survive restart so next boot bypasses immediately without re-detection. (4) KnownGaps gains interior-mutable add_gap() using parking_lot::RwLock<Vec> so the handler can mutate at runtime without changing hot-path API. DEFAULT_GAPS now empty (was "25988:100440") — operators don't need to set anything. (5) main.rs wires libp2p_discovery (Arc<Mutex<NetworkManager>>) + turbo_sync via broadcast channel size=64; calls load_persisted_gaps() at startup. Env var Q_KNOWN_PERMANENT_GAPS still respected as operator override but never surfaced in user-facing docs. # v10.9.47: TWO SECURITY/AGENTIC FIXES — (A) NEW endpoint POST /api/v1/transactions/send_signed accepting X-Wallet-Auth only (no mnemonic, no vault) — mirrors the /dex/swap pattern so client-managed wallets (32-byte seeds, not BIP39) can send QUG/QUGUSD/custom-token transfers natively from MCP. Existing /transactions/send untouched (backward-compat). (B) /api/v1/contracts/airdrop NOW REQUIRES AuthenticatedWallet + verifies caller == contract.deployer + caps recipients per call at 1000. CRITICAL FIX: pre-v10.9.47 anyone could call airdrop on any deployed contract with zero auth (security gap discovered 2026-05-17 while building agentic-money primitives — used unauth path to deliver CLAI Token #1 to user, then immediately patched). v10.9.46: TWO consolidated fixes after careful diagnosis (no edit-compile-iterate cycle this round). (1) KNOWN-GAP OFF-BY-ONE FIX: turbo_sync.rs:6904 condition was `gap_start == working_height + 1` which silently failed every call on the canary (contiguous=26000 vs gap (25988, 100440) → 25988 == 26001 → false → no advance). Loosened to `next_block ∈ [gap_start, gap_end]` so the auto-advance fires whenever the next missing block falls anywhere inside the known gap range. Verified via 22 min of canary logs at 12:14–12:38 UTC showing `[CONFIG] Q_KNOWN_PERMANENT_GAPS = '25988:100440' parsed` once, then ZERO `[KNOWN-GAP] Auto-advanced` follow-up lines despite repeated `sync_to_height target=18112xxx contiguous=26000` invocations. (2) BIP39 BRAINWALLET HARDENING: import_wallet handler (handlers.rs:2287) now validates the supplied mnemonic against the BIP39 English wordlist+checksum BEFORE the legacy SHA3-256 derivation. Triggered by Discord report 2026-05-17 from a community member who landed in someone else's wallet after typing "a random number" — root cause was naive SHA3 hashing of any 12-word string with no wordlist or checksum check (validateSeedPhrase counted words and 3-8 char length only). Web wallet (LoginScreen.tsx + walletAuth.ts) also fixed to validateMnemonic via @scure/bip39 in same release — separate npm build. Slint native always validated (uses bip39::Mnemonic::parse_in). ALSO ADDED 5 Prometheus science gauges + 3 KNOWN-GAP gauges via q-storage::metrics::SyncOptimizerGauges (qnk_known_gap_configured_count/advances_total/blocks_skipped_total, qnk_kalman_bandwidth_mbps/latency_ms/loss_percent/optimal_chunk_kb/confidence), with new `encode_default_registry()` helper that NetworkMetrics::encode_text() can call to append the legacy prometheus crate's gauges to /metrics output (currently registered but unreachable). Wiring of Kalman writers deferred — gauges present so future writes appear in dashboards. v10.9.45 carry-forward: tokio-console layer composed into existing tracing registry (single global dispatcher), Q_KNOWN_PERMANENT_GAPS env var parsing, SIMD items 9/10/11/12/14, gossipsub config 1MB. # v10.9.45: HOTFIX v10.9.44 tokio-console init panic. v10.9.44 called `console_subscriber::init()` which installs its own GLOBAL tracing dispatcher, then the existing `tracing_subscriber::registry().init()` panicked with "a global default trace dispatcher has already been set". Fixed by building the console layer via `ConsoleLayer::builder().with_default_env().spawn()` and COMPOSING it into the existing registry alongside env_filter + fmt/tui layers — single global dispatcher, both functionalities preserved. Carries all v10.9.44 changes (Q_KNOWN_PERMANENT_GAPS deterministic skip, Kalman BDP chunk-size, CUBIC AIMD per-peer inflight, EWMV per-peer timeout, Beta Thompson peer pick helpers, 4 Prometheus gauges, SIMD items 9-12+14). # v10.9.44: WIRE in math optimizers + DEFINITIVE gap-skip. (a) Q_KNOWN_PERMANENT_GAPS env var — comma-separated `start:end` ranges; turbo_sync checks contiguous_height on every tick and advances past any gap whose start matches. The 26K wall is a KNOWN data-loss range (25988..=100440); this lets clients skip it without needing the server-side gap-decl trigger to ever fire. Default: `Q_KNOWN_PERMANENT_GAPS=25988:100440`. (b) Kalman BDP wired into chunk_size_kb (item 1). (c) CUBIC AIMD wired into per-peer inflight cap (item 3). (d) EWMV-derived per-peer timeout (item 7). (e) Beta-Thompson peer picker (item 2). Items 4, 5, 6, 8 exposed as Prometheus gauges only; integration in v10.9.45. CARRIES v10.9.43 SIMD wins (items 9-12, 14) + diagnostic INFO logs at block-pack handler branches. # v10.9.43: FIX v10.9.42 REGRESSION + add diagnostics. KEEP the working 0→26K sync path UNTOUCHED — fresh canaries consistently reach h=25,987-26,000 in ~16 min flat, proves the chunk scheduler/libp2p/validation/semaphore tuning is fundamentally correct. The problem is ONLY at the data-gap edge, NOT the sync engine. (1) REMOVE the 5s tokio::time::timeout on get_qblocks_forward — DeepSeek-suggested timeout cut off the EXACT code path that detects gaps; prod log v10.9.42 showed `⏱️ [BLOCK-PACK] get_qblocks_forward timed out (5s)` firing constantly with ZERO GAP-DECL emissions. The forward-seek scans through millions of blocks finding the next available; 5s is not enough on a 219 GB RocksDB. Forward-seek runs in a spawned task (block_pack_semaphore-gated) so it doesn't block the main loop; let it run as long as needed. (2) REVERT max_transmit_size 2 MB → 1 MB — gossipsub buffered larger messages caused the leak to ACCELERATE (NRestarts went from ~2/hr v10.9.41 → ~6/hr v10.9.42). (3) PRODUCER HEARTBEAT task: 60s tick, WARN with current tip height when no block produced in 60s — surfaces the wedged-producer secondary symptom we've been inferring from height-not-advancing. (4) tokio-console ENABLED BY DEFAULT so operators don't need a rebuild for diagnostics; runtime overhead ~3-5% accepted for the visibility win. (5) MORE DETAILED INFO logging in the block-pack handler: log forward-seek start/end, first_h, our_height, every code branch taken — so the next round of diagnosis doesn't need 30 min of speculation. Jemalloc heap profile build (suggested) deferred — switching global allocator is risky and v10.9.43 needs to ship fast. # v10.9.42: KILLER SOLUTION — broaden permanent_gap trigger so it ACTUALLY fires in production. v10.9.41 trigger condition (fast-path empty AND forward-seek skipped >10K) was unreachable in prod (live test 2026-05-17: 0 declarations in 30 min of two canaries hammering the gap). Fix: always probe forward-seek when fast-path returns less than `limit`, with a 5s timeout. If forward-seek first_h > start + 10K, emit permanent_gap and return early — regardless of fast-path partial state. Also (a) gossipsub backpressure config (send_queue_size=512, max_transmit_size=2MB, gossip_lazy=2, max_messages_per_rpc=1024) to slow the 110-150 MB/min memory leak in v10.9.41; (b) producer heartbeat task (60s tick, WARN if no block in 60s with current tip height for diagnostic value); (c) 3 new Prometheus counters (qnk_permanent_gap_declarations_sent_total, qnk_permanent_gap_declarations_received_total, qnk_permanent_gap_advances_applied_total) so operators can curl /metrics to confirm the fix is firing; (d) promote gap-declaration log from WARN to INFO. # v10.9.41: (Z) DeepSeek §0 forgery FIX in tip proof — pre-fix commitment was BLAKE3(transcript) only, allowing a malicious prover to substitute any (anchor, tip) values and pass verification. Fix: commit() now folds (anchor_height, anchor_state, tip_height, folded_state, transcript) into the keyed hash. Verifier recomputes from EXPECTED (anchor) + claimed (tip + folded_state + transcript) and checks against proof.commitment. Renamed proof_version "lattice-tip-v1" → "tip-blake3-fs-v1" per DeepSeek §1 (the actual reduction is BLAKE3 preimage = 128-bit Grover-quantum, NOT a lattice problem; "lattice-tip-vN" reserved for real Module-SIS in v10.10.0). Added version byte 0x01 to all hashed inputs per §2. New regression tests: rejects_deepseek_anchor_swap_forgery and rejects_tip_height_inflation cover the exact attack DeepSeek described. (A) PERMANENT-GAP TOLERANT SYNC — fixes "stuck at 26K" caused by network-wide loss of historical blocks 26,001..=100,440 from the pre-checkpoint pruning bug. New BlockPackResponse.permanent_gap: Option<(u64,u64)> field. Server (unified_network_manager.rs ~4060): when forward-seek lands more than MAX_FORWARD_SKIP=10K past the requested start_height, return an empty response with `permanent_gap = Some((start, first_h - 1))` (was returning silent empty in v10.9.38-v10.9.40). Client: tallies declarations per (start,end) tuple in `gap_declarations: HashMap<(u64,u64), HashSet<PeerId>>`. Once `Q_GAP_QUORUM` independent peers (default 2) corroborate a gap, the (start,end) is broadcast via `gap_advance_tx` so turbo_sync can advance `contiguous_height` past the unrecoverable hole. Operator override: `Q_GAP_TRUST_SINGLE_PEER=1` accepts a gap from any one peer (useful when only one node in the network has post-gap data). Diagnosed 2026-05-16 via tshark + Beta-and-Epsilon BLOCK-PACK forward-seek logs both showing the same 26K→100K skip — proving the gap is network-wide, not local. (B) RECURSIVE LATTICE TIP PROOF — — replaces the all-zeros placeholder at /api/v1/proof/tip with a real cryptographic proof a fresh bootstrapping node can verify in <10ms before beginning sync. New module q-recursive-proofs::tip_proof_v1: anchor() seeds a 64-byte Fiat-Shamir transcript from (anchor_height, anchor_state); extend() folds (prev_proof, new_block_header) into the transcript, then compresses to a 32-byte Ajtai-SIS commitment via BLAKE3 keyed mode (domain key "qnk-sis-commit-v1"). verify() recomputes the transcript-to-commitment hash + checks anchor binding — 0.3 ms on Epsilon's xeon-gold per measurement. wire size 176 bytes. PQ-secure (no curve/pairing math, soundness reduces to SIS + BLAKE3 collision). proof_version flips from "placeholder-v0" → "lattice-tip-v1-step" — wallets MUST upgrade their banner display per blueprint 5. Current handler ships a single-step proof (tip-1 → tip); chain-wide variant pending a producer hook on commit_block (deferred to producer-loop refactor). # v10.9.40: STRUCTURAL ROOT-CAUSE FIX for "stuck at 26K" — the actual bug. Deep tshark+ss analysis on Epsilon (2026-05-16): canary → prod TCP healthy (no RST/FIN, sustained 680-byte PSH+ACK every 10s), but prod's kernel Recv-Q at port 9001 accumulated 500+ KB per peer — production's libp2p task was NOT READING the sockets. Root cause: `unified_network_manager.rs:2844` has a `tokio::select! { biased; ... }` where `queue_drain_interval.tick()` at 1 ms interval (default MissedTickBehavior::Burst) was ALWAYS Ready, starving `self.swarm.select_next_some()` at slot #5. On a busy node generating 30+ gossipsub messages/sec, the queue_drain branch fired continuously; libp2p Swarm inbound stream reads never got a turn. Symptom matrix: qnk_peers_connected=0 in metrics, fork_detector "Only 0 peers connected", BUT the `[BLOCK-PACK]` handler logs ZERO entries despite canary repeatedly sending requests — confirming requests arrived at the TCP layer but never reached the libp2p Behaviour. Fix in this release: (a) queue_drain_interval 1 ms → 10 ms; (b) MissedTickBehavior::Skip on queue_drain + peer_scoring + health_check intervals (prevents 50-tick burst catch-up after a slow drain); 10ms * 10 msgs/batch = 1000 msg/s capacity, still 30× any realistic load. ALSO carries v10.9.39 fixes: (1) Gamma bootstrap peer ID refreshed at unified_network_manager.rs:259 (`WFfZKfKbBnB5...` → `WHNhCWYmUiGGG...` matching config.rs:398); (2) `[QUEUE DRAIN] Failed to publish` demoted WARN → DEBUG to stop journald saturation; (3) Node TUI sync card always renders + new "📡 Sync Stats (Prometheus + API)" panel + sliding-window 10s blocks-per-sec replacing cumulative-from-start average. # v10.9.39 prior body: (1) Refresh Gamma bootstrap peer at unified_network_manager.rs:259 — was `WFfZKfKbBnB5...`, now matches current `WHNhCWYmUiGGG...`. config.rs:398 was already updated; the network manager list was stale, so Epsilon's auto-dial of Gamma silently failed and the cross-server mesh never anchored — observable as `fork_detector: Only 0 peers connected` on prod even when canary reports `connected peers: 1`. (2) Demote `[QUEUE DRAIN] Failed to publish` from WARN to DEBUG: on a solo/low-peer node it fires 30+×/s (NoPeersSubscribedToTopic for miner-stats/mining-challenges/finality-certs), saturates journald, and exacerbates the libp2p starvation v10.9.36 already tried to fix. Root cause is metric-visible via peer_count=0 — the per-publish WARN was pure noise. (3) Node TUI sync card now always renders (was hidden once is_syncing flipped false at gap ≤50), with a new "📡 Sync Stats (Prometheus + API)" panel underneath: peers in/out, bandwidth rates+totals, APOLLO Kalman/PID, mining/API/integrity. Sliding-window 10s blocks-per-sec replaces the cumulative-from-process-start average that always read ~0 after a few hours uptime. # v10.9.38: ROOT-CAUSE FIX for "stuck at 26K" stall + carries v10.9.37 cap bump. Diagnosed via canary logs (q-sync-test-v10936) + Prometheus (qnk_local_height pinned at 26000, qnk_libp2p_rx_bytes_total ticking, height_progression flat): server's get_qblocks_forward() returns the first available block AT OR AFTER start_height. When there's a storage-format discontinuity (blocks 26001..100440 in an old format the DAG iterator can't traverse), it returns 100441+. Client's GAP_SKIP_REFUSED safety cap (10K) rejects these "200 blocks at heights 100441-105859" responses as too-far-from-contiguous → infinite retry of the same misaligned request. Fix at unified_network_manager.rs:~4041: refuse to return forward-seek blocks if first_height > start_height + 10K; treat as empty response (lets the gap-fill scheduler move the request window forward to where the server actually has data). v10.9.37: BLOCK-PACK CAP 200 → 2000. v10.9.36 proven (canary went 0 → 26K in 2.5 min = ~33 b/s sustained, past v10.9.28 stall) but throughput ceilinged at ~33 b/s because the server's per-response hard cap (line ~4006) caps blocks at 200 per response. With CLIENT_INFLIGHT_BLOCK_PACK_PER_PEER=16 and avg ~3s round-trip, 200×16÷3 ≈ 1066 b/s theoretical max but realistic ~33-66 b/s. Raising cap to 2000 (max 500 MB per response, well under 8 GB container) lifts ceiling to ~10,666 b/s theoretical. Tunable via Q_BLOCK_PACK_MAX env. Previous: v10.9.36: STRUCTURAL FIX (10ms→100ms run_once timeout). — bump run_once() outer-loop timeout 10ms→100ms (main.rs:6248). Code analytics 2026-05-16: 10ms polling slices were starving libp2p Swarm of continuous polling time needed to drive multi-round-trip Noise XX + Identify handshakes; peer mesh never forms (canary qnk_peers_connected=0 after 40+ min uptime even with Q_MAX_MEMORY_BYTES=64GiB env-var disabling memory_connection_limits gate). 100ms still well below the original v1.0.22 deadlock threshold (which was lock-held-forever, several MINUTES). Other tasks needing the manager lock will wait at most 100ms per iteration, vs ~10ms previously — 10x slower lock acquire but enough continuous polling for libp2p to complete handshakes. Carries forward all v10.9.31-35 work. Previous: v10.9.35: SWARM TRACE NOW IN run_once() (the ACTIVE driver). Deep-code analysis found main.rs:6250 calls nm.run_once(), NOT nm.run(). The v10.9.34 [SWARM-EVT] trace was placed in run() which is dead code — never executes. v10.9.35 adds the same [SWARM-EVT-RUN-ONCE] trace inside the run_once() Swarm dispatch arm (line ~5523) so the canary will actually emit trace lines on each Swarm event. This is what tells us if the loop is alive but inert vs dead entirely. v10.9.34: VERBOSE SWARM EVENT TRACING. Adds per-event-variant INFO log at the SwarmEvent dispatch entry (line ~3210 in unified_network_manager.rs) so we can see in canary logs WHICH SwarmEvent variants actually fire vs which never do — diagnoses the "libp2p mesh never forms" symptom where qnk_peers_connected stays at 0 and all libp2p_swarm_* metrics read 0. Logs labelled `[SWARM-EVT]` (variant name) and `[SWARM-EVT-BEHAVIOUR]` (behaviour type). Carries forward v10.9.33 self-dial filter, v10.9.32 metric wiring, v10.9.31 permits bump, and QUG add_liquidity counter. Previous: v10.9.33: BOOTSTRAP SELF-DIAL FILTER. Agent-A deep diagnostic (2026-05-16) found P1-4: Epsilon's own peer_id is in its own HARDCODED_BOOTSTRAP_PEERS list, so every bootstrap iteration spent a scheduler slot dialing itself, hit the [PEER CHECK] fast-fail at unified_network_manager.rs:6070, and emitted a noisy ERROR. New helper priority_ordered_bootstrap_filtered(map, local) filters out the local peer_id before returning the dial set; existing call site at line ~2377 switched over. Stops the self-dial spam and frees a scheduler slot per cycle. Carries forward v10.9.32 (metrics wiring), v10.9.31 (BLOCK_PACK_BASE_PERMITS 4→16), and the QUG add_liquidity debit-counter fix. Previous: v10.9.32: SYNC FIX + LIBP2P METRICS WIRED. Adds the diagnostic infrastructure that should have shipped with v10.9.27. The qnk_libp2p_rx_bytes_total + qnk_libp2p_tx_bytes_total + qnk_block_pack_response_bytes histogram were all DECLARED in metrics.rs but NEVER INCREMENTED anywhere in the codebase — every dashboard read 0 forever. Wired three increments in unified_network_manager.rs: server-side request receive (line ~3899), client-side response receive (line ~4047), server-side response send (line ~5449). Uses bincode::serialized_size for accurate byte counts. With these live, the next canary will tell us in 30s whether libp2p block-pack is actually carrying traffic vs the HTTP turbo-sync fallback. Carries forward v10.9.31's BLOCK_PACK_BASE_PERMITS 4→16 bump and the QUG add_liquidity debit-counter fix. v10.9.31:  SYNC THROUGHPUT FIX. (1) BLOCK_PACK_BASE_PERMITS bumped 4 → 16 in unified_network_manager.rs (line ~1125). Diagnosed via deep code analysis after v10.9.30 canary still synced at only ~13 b/s with qnk_libp2p_rx_bytes_total=0: the server-side block-pack handler at line ~3939 returns an EMPTY BlockPackResponse when the per-peer permit semaphore is exhausted, and the client cannot distinguish empty-because-saturated from empty-because-no-blocks-at-this-height — so it backs off retries on legitimate-looking misses. With v9.1.8's 200-block per-response cap (~50 MB max), 16 base permits = ~800 MB peak allocation (well under the 50 GB cgroup high-water mark). Lifts unsynced-server throughput from 4 concurrent block-packs to 16, and total fully-synced capacity from 16 to 28 (16 base + 12 extra). (2) Includes the QUG add_liquidity debit-counter fix: liquidity_api.rs::add_liquidity now calls record_dex_qug_debit on both native-QUG paths so LP deposits survive on-chain replay (apply_dex_qug_adjustments idempotency restored). (3) MUST cargo clean --package q-api-server before building this release so the API-reported version actually reads 10.9.31, not the cached prior string. Previous: v10.9.30: LIBP2P PEER-ADDR CACHE FIX. Wireshark+log forensics on Epsilon Docker (v10.9.29 stalled at 26K) revealed real cause: [PEER CHECK] in unified_network_manager.rs:6040 reads from self.peer_addresses, which was constructed as empty HashMap at line 2675 even though bootstrap-resolution built fully-populated `all_peer_addresses` (Epsilon /ip4/89.149.241.126/tcp/9001, Beta, Gamma, Delta). Bootstrap addrs flowed into Kademlia DHT but NOT into the cache the block-pack scheduler consults — every chunk targeting Epsilon (only peer with full historical chain) hit "NOT connected and has NO cached address!" and round-robin'd to random tip peers whose block-pack returns empty for ranges <18M. Fix (one line): seed peer_addresses from all_peer_addresses.clone() at construction. PLUS: QNarwhalEvent::Identify(Received) was previously debug-logged and discarded — now inserts info.listen_addrs into peer_addresses so we keep learning addresses post-bootstrap. v10.9.29 chunk-end-clip stays in place (verified working: height 0 → 26K past v10.9.28 plateau). Previous: v10.9.29: SYNC CHUNK-END CLIP + BALANCE INTEGRITY. (1) Genesis-window cap now clips chunk END to window_cap, not just filters by chunk start — fixes v10.9.28 stall at 26K where a single oversized chunk (ML predictor picked huge size) spanned 26K→18M, passed the start≤cap filter, then failed ingest because the response body covered heights far beyond the 10K window. With end-clipping every dispatched chunk's response is guaranteed ingestable. Applied to all 3 cap sites (split_into_chunks, gap-fill, sync_to_height). (2) CRITICAL: save_wallet_balance (singular) now has max-wins guard per CLAUDE.md Rule 1. Stale writes that would LOWER a balance are now SKIPPED with ERROR log, on-disk value preserved. The plural save_wallet_balances had this guard but the singular form was missing it — production was observing 5% balance fluctuation on Epsilon because of this gap. Previous: v10.9.28: SYNC INGESTION FIX + METRIC WIRING. (1) Q_GENESIS_LOOKAHEAD_BLOCKS default lowered 1M → 10K to match the pre-existing GAP_SKIP_REFUSED ingestion safety cap — v10.9.27 dispatched chunks within 1M of contiguous but >90% got refused at ingest with "Gap exceeds safety cap 10000", causing 0 height advance + 50MB/min RSS leak from the retry-storm. With 10K window, every dispatched chunk is ingestable. (2) Wired qnk_local_height + qnk_blocks_synced_total gauges from the existing 5s height reconciler so /metrics emits an honest sync-progress signal (was stuck at 0 in v10.9.27 due to missing callers). Remaining metric wiring (chunks_in_flight, retry_total, bootstrap_dial, block_pack_request, libp2p_swarm_*) tracked as follow-up commits — those need turbo_sync + unified_network_manager hooks. Previous: v10.9.27: "WORKS OUT OF THE BOX" — auto-defaults for fresh nodes (Q_GENESIS_SYNC_ONLY + Q_SKIP_CHECKPOINT auto-set when DB is empty), P2P port 9001 auto-fallback to 9100-9999 on EADDRINUSE, comprehensive Prometheus /metrics endpoint (qnk_peers_connected, qnk_block_pack_request_total, qnk_chunk_retry_total, libp2p_swarm_connections_closed_total{cause} — see crates/q-network/src/metrics.rs), client-side per-peer block-pack semaphore (CLIENT_INFLIGHT_BLOCK_PACK_PER_PEER=4) + retry-storm dampener (ClientThrottle errors don't consume retry budget), libp2p memory-connection-limits behaviour wired (1 GiB default, Q_MAX_MEMORY_BYTES tunable), connection-close WARN diagnostic with cause string (journalctl-visible at Epsilon's WARN level), banner network_id resolution fixed to match runtime (env-first, not clap-default-first). Diagnostic-by-curl: `curl :PORT/metrics | grep libp2p_swarm_connections_closed_total` shows close reasons; `qnk_bootstrap_dial_total{result="failed"}` shows dial outcomes; `qnk_block_pack_request_total{direction="out",result="throttle"}` shows client back-pressure. Previous: v10.9.26: GENESIS-WINDOW SCHEDULER (FULL COVERAGE). v10.9.25 only patched sync_to_height; multiple other chunk-building call sites (split_into_chunks at line 4167, gap-fill at line 3576+) bypassed the cap and produced requests at heights > local + 1M, causing the "synced 26k blocks then stops" symptom on Beta + Epsilon docker tests. Both v10.9.25 and v10.9.26 honor Q_GENESIS_SYNC_ONLY=1. Previous: v10.9.25: GENESIS-WINDOW SCHEDULER. Fixes "synced 4045 blocks then gravity-assist spins forever" pattern in genesis mode. When Q_GENESIS_SYNC_ONLY=1, turbo_sync.rs::sync_to_height filters the chunk set to chunks within Q_GENESIS_LOOKAHEAD_BLOCKS (default 1M) of contiguous height. Without the cap, gravity-assist's parallel streams were saving blocks at heights 6M, 9M, 13M while the contiguous chain crawled forward from genesis at ~22 bps — wasting bandwidth on blocks that couldn't unblock progress until the gap below filled. With the cap, every in-flight chunk directly extends the contiguous chain. Checkpoint and endgame modes unaffected. Previous: v10.9.24: SYNC-UNWEDGE FIXES. (1) qblock:latest pointer heal at startup — if scan_highest_contiguous returns N > current qblock:latest, force qblock:latest = N. Unsticks turbo-sync request building after a checkpoint apply (was producing range:0-0 forever because pointer-cap could never walk past gap). (2) Readiness ArchiveComplete now requires `contiguous >= max(local_tip, peer_max_height)` AND at least one peer-height-proof seen — fixes premature ArchiveComplete at 21k blocks when peer-heights haven't propagated yet. Previous: v10.9.22: SYNC-LIVE FIX. Stops the mining-rejection feedback loop that wedged Epsilon (1342% CPU / 52GB RSS / VDF spawn_blocking timeouts). Two changes: (1) handlers.rs:9794 — rate-limit the 503 mining-reject `warn!` to once per 30s (was firing 2K+/sec with 400 miners, matching the success-log rate-limit at line 9837). (2) main.rs:25321 — custom TraceLayer on_failure that suppresses ERROR logs for 503 SERVICE_UNAVAILABLE so tower stops doubling the storm. Together these prevent the journald-saturation → libp2p-starvation cascade that left Epsilon perpetually 10K+ blocks behind tip and unable to serve new-node bootstrap. Previous: v10.9.21: HONEST LIQUIDITY. bootstrap_bridge_pools no longer auto-mints unbacked wBTC at boot — pools start as empty shells; real LPs must deposit. handlers.rs swap path returns "No wBTC liquidity yet — be the first LP" instead of silently trading against fake supply. NEW one-click LP flow: POST /api/v1/bitcoin/lp/intent escrows QUG, generates Knots deposit address, and on finalize atomically mints wBTC + pulls escrowed QUG + adds liquidity, minting LP tokens to the user (cancel/refund + finalize/list/get endpoints, LP intent persisted in CF_MANIFEST under btc_lp_intent:*). Frontend gains a "Bridge LP" tab in BitcoinSwapModal with the wizard. Previous: v10.9.20: wBTC reserve check gated on `use_oracle` so AMM-pool swaps work without a configured Bitcoin bridge. bootstrap_bridge_pools preserves traded reserves across restarts (only reseeds when drained below 1% of bootstrap). /api/v1/bitcoin/withdraw gains real bitcoin::Address mainnet validation + optional fee_priority (economy/normal/fast → Knots conf_target 30/6/2). DepositBridge::send_to_address_with_target + send_withdrawal(conf_target). Frontend BitcoinSwapModal: real user-pasted compressed BTC pubkey required for HTLC swaps (no more fake 0x02||qnk_addr fabrication); confirmation text 3→6 blocks to match BTC_MIN_CONFIRMATIONS. sendBitcoin() in services/api.ts now hits the real /v1/bitcoin/withdraw instead of the nonexistent /v1/bitcoin/send.  Previous: v10.9.19: huge "hum" release. (1) Track A TUI readiness banner Bootstrapping/FastReady/CheckpointTrust/GenesisSync/ArchiveComplete. (2) GET /api/v1/engine/pulse — comprehensive live vitals JSON with sync heights, mining counters, P2P bytes, mempool size, gap-to-tip, wallet count, decentralization EMA. (3) GET /api/v1/proof/tip — Phase 1 placeholder recursive-SNARK endpoint (wallet integration unblocked). (4) K-parameter gauge extended to 5 cards with new Engine Pulse column (data integrity / quorum / API count / P2P). (5) Boot tracker step 10 shows Q_BOOTSTRAP_MIN_PEERS knob. (6) HEALTH log cosmetic fix — "unbounded" instead of "0.0G (0%)" when cgroup has no limit. (7) Phase 2 trigger requires 3 consecutive ready ticks (~90s) before firing to avoid false-positives on small peer sets. (8) max_established_per_peer raised 2→4, tunable via Q_MAX_CONNS_PER_PEER. New q-ivc-verifier-wasm Phase 1 scaffold crate. DeepSeek job-board doc shipped covering Jobs A-K. Track C dilithium fixtures + Track D network instrumentation still deferred (submitted patches had compile/math issues).
