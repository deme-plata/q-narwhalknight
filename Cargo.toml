# ═══════════════════════════════════════════════════════════════════
# v7.4.3: Release profile optimizations for maximum mining performance
# ═══════════════════════════════════════════════════════════════════
# Dev profile: faster incremental builds (Issue #033)
# codegen-units=16 parallelizes LLVM codegen; opt-level=1 gives
# enough optimization for debug runs without full release overhead.
# ═══════════════════════════════════════════════════════════════════
[profile.dev]
opt-level = 1               # Basic optimizations — prevents debug-mode slowness
codegen-units = 16           # Parallel codegen for faster incremental builds
debug = "line-tables-only"   # Minimal debug info — saves link time, still get backtraces

[profile.dev.package."*"]
opt-level = 2               # Optimize dependencies more than local code

# LTO + codegen-units=1 enables cross-crate inlining and whole-program optimization
# This allows blake3's SIMD routines to be fully inlined into the mining hot loop
# ═══════════════════════════════════════════════════════════════════
[profile.release]
lto = "thin"            # Link-Time Optimization: enables cross-crate inlining (+10-15%)
codegen-units = 1       # Single codegen unit: best optimization, slower compile (+5-10%)
opt-level = 3           # Maximum optimization level
strip = "symbols"       # Strip debug symbols for smaller binary
panic = "abort"         # Abort on panic: eliminates unwinding overhead

# Also optimize blake3 specifically since it's the mining hot path
[profile.release.package.blake3]
opt-level = 3
codegen-units = 1
