# Architecture compatibility - removed core_arch patch for stable Rust compatibility

# Examples are defined in individual crate Cargo.toml files

[workspace.dependencies]
# Core Rust ecosystem
tokio = { version = "1.0", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
uuid = { version = "1.0", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
clap = { version = "4.0", features = ["derive"] }
anyhow = "1.0"
thiserror = "1.0"
async-trait = "0.1"

# Web framework
axum = { version = "0.7", features = ["ws"] }
tower = { version = "0.4", features = ["limit"] }
tower-http = { version = "0.5", features = ["cors", "trace", "fs", "timeout"] }
hyper = "1.0"

# Networking - Enhanced for real network connectivity (libp2p 0.56 upgrade)
# mdns removed from default features - will be added conditionally in q-network for Linux only
# 🔥 v2.0.0: Upgraded to libp2p 0.56 with WebRTC support via separate crate
# NOTE: connection-limits is built-in to libp2p 0.56, not a feature flag
# v10.9.27: enabled "memory-connection-limits" (OOM-safety: refuse new conns under memory pressure)
# and "metrics" (Prometheus-format /metrics endpoint with peer count, gossipsub mesh, connection
# close reasons, request-response latency — diagnostic gold for "why did this peer disconnect")
libp2p = { version = "0.56", features = ["noise", "yamux", "tcp", "gossipsub", "identify", "ping", "kad", "upnp", "macros", "tokio", "request-response", "dns", "quic", "websocket", "autonat", "relay", "dcutr", "memory-connection-limits", "metrics"] }
# 🌐 WebRTC-Direct transport for browser P2P connectivity (alpha) - NOT in workspace (optional per-crate)
reqwest = { version = "0.12", features = ["json", "socks", "stream", "rustls-tls", "blocking"] }

# Real network implementations
arti-client = "0.9"
arti-hyper = "0.9"
tor-rtcompat = "0.9"
tor-hsservice = "0.9"
hickory-dns = "0.24"
# Use bitcoin 0.30 for compatibility with bitcoincore-rpc 0.17
bitcoin = { version = "0.30", features = ["serde"] }
crc32fast = "1.3"
# base64 = "0.21" # Removed duplicate, using 0.22.1 below
hex = "0.4"

# Cryptography (Phase 0: Classical)
