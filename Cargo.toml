# v2.5.1-beta: AEAD encryption for P2P AI message privacy
chacha20poly1305 = "0.10"

# Post-quantum cryptography (Phase 1+) - GLIBC compatible versions
pqcrypto-dilithium = "0.5"
pqcrypto-kyber = "0.7"
pqcrypto-falcon = "0.3"
pqcrypto-traits = "0.3"
