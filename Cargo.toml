version = "10.9.38"  # v10.9.38: ROOT-CAUSE FIX for "stuck at 26K" stall + carries v10.9.37 cap bump. Diagnosed via canary logs (q-sync-test-v10936) + Prometheus (qnk_local_height pinned at 26000, qnk_libp2p_rx_bytes_total ticking, height_progression flat): server's get_qblocks_forward() returns the first available block AT OR AFTER start_height. When there's a storage-format discontinuity (blocks 26001..100440 in an old format the DAG iterator can't traverse), it returns 100441+. Client's GAP_SKIP_REFUSED safety cap (10K) rejects these "200 blocks at heights 100441-105859" responses as too-far-from-contiguous → infinite retry of the same misaligned request. Fix at unified_network_manager.rs:~4041: refuse to return forward-seek blocks if first_height > start_height + 10K; treat as empty response (lets the gap-fill scheduler move the request window forward to where the server actually has data). v10.9.37: BLOCK-PACK CAP 200 → 2000. v10.9.36 proven (canary went 0 → 26K in 2.5 min = ~33 b/s sustained, past v10.9.28 stall) but throughput ceilinged at ~33 b/s because the server's per-response hard cap (line ~4006) caps blocks at 200 per response. With CLIENT_INFLIGHT_BLOCK_PACK_PER_PEER=16 and avg ~3s round-trip, 200×16÷3 ≈ 1066 b/s theoretical max but realistic ~33-66 b/s. Raising cap to 2000 (max 500 MB per response, well under 8 GB container) lifts ceiling to ~10,666 b/s theoretical. Tunable via Q_BLOCK_PACK_MAX env. Previous: v10.9.36: STRUCTURAL FIX (10ms→100ms run_once timeout). — bump run_once() outer-loop timeout 10ms→100ms (main.rs:6248). Code analytics 2026-05-16: 10ms polling slices were starving libp2p Swarm of continuous polling time needed to drive multi-round-trip Noise XX + Identify handshakes; peer mesh never forms (canary qnk_peers_connected=0 after 40+ min uptime even with Q_MAX_MEMORY_BYTES=64GiB env-var disabling memory_connection_limits gate). 100ms still well below the original v1.0.22 deadlock threshold (which was lock-held-forever, several MINUTES). Other tasks needing the manager lock will wait at most 100ms per iteration, vs ~10ms previously — 10x slower lock acquire but enough continuous polling for libp2p to complete handshakes. Carries forward all v10.9.31-35 work. Previous: v10.9.35: SWARM TRACE NOW IN run_once() (the ACTIVE driver). Deep-code analysis found main.rs:6250 calls nm.run_once(), NOT nm.run(). The v10.9.34 [SWARM-EVT] trace was placed in run() which is dead code — never executes. v10.9.35 adds the same [SWARM-EVT-RUN-ONCE] trace inside the run_once() Swarm dispatch arm (line ~5523) so the canary will actually emit trace lines on each Swarm event. This is what tells us if the loop is alive but inert vs dead entirely. v10.9.34: VERBOSE SWARM EVENT TRACING. Adds per-event-variant INFO log at the SwarmEvent dispatch entry (line ~3210 in unified_network_manager.rs) so we can see in canary logs WHICH SwarmEvent variants actually fire vs which never do — diagnoses the "libp2p mesh never forms" symptom where qnk_peers_connected stays at 0 and all libp2p_swarm_* metrics read 0. Logs labelled `[SWARM-EVT]` (variant name) and `[SWARM-EVT-BEHAVIOUR]` (behaviour type). Carries forward v10.9.33 self-dial filter, v10.9.32 metric wiring, v10.9.31 permits bump, and QUG add_liquidity counter. Previous: v10.9.33: BOOTSTRAP SELF-DIAL FILTER. Agent-A deep diagnostic (2026-05-16) found P1-4: Epsilon's own peer_id is in its own HARDCODED_BOOTSTRAP_PEERS list, so every bootstrap iteration spent a scheduler slot dialing itself, hit the [PEER CHECK] fast-fail at unified_network_manager.rs:6070, and emitted a noisy ERROR. New helper priority_ordered_bootstrap_filtered(map, local) filters out the local peer_id before returning the dial set; existing call site at line ~2377 switched over. Stops the self-dial spam and frees a scheduler slot per cycle. Carries forward v10.9.32 (metrics wiring), v10.9.31 (BLOCK_PACK_BASE_PERMITS 4→16), and the QUG add_liquidity debit-counter fix. Previous: v10.9.32: SYNC FIX + LIBP2P METRICS WIRED. Adds the diagnostic infrastructure that should have shipped with v10.9.27. The qnk_libp2p_rx_bytes_total + qnk_libp2p_tx_bytes_total + qnk_block_pack_response_bytes histogram were all DECLARED in metrics.rs but NEVER INCREMENTED anywhere in the codebase — every dashboard read 0 forever. Wired three increments in unified_network_manager.rs: server-side request receive (line ~3899), client-side response receive (line ~4047), server-side response send (line ~5449). Uses bincode::serialized_size for accurate byte counts. With these live, the next canary will tell us in 30s whether libp2p block-pack is actually carrying traffic vs the HTTP turbo-sync fallback. Carries forward v10.9.31's BLOCK_PACK_BASE_PERMITS 4→16 bump and the QUG add_liquidity debit-counter fix. v10.9.31:  SYNC THROUGHPUT FIX. (1) BLOCK_PACK_BASE_PERMITS bumped 4 → 16 in unified_network_manager.rs (line ~1125). Diagnosed via deep code analysis after v10.9.30 canary still synced at only ~13 b/s with qnk_libp2p_rx_bytes_total=0: the server-side block-pack handler at line ~3939 returns an EMPTY BlockPackResponse when the per-peer permit semaphore is exhausted, and the client cannot distinguish empty-because-saturated from empty-because-no-blocks-at-this-height — so it backs off retries on legitimate-looking misses. With v9.1.8's 200-block per-response cap (~50 MB max), 16 base permits = ~800 MB peak allocation (well under the 50 GB cgroup high-water mark). Lifts unsynced-server throughput from 4 concurrent block-packs to 16, and total fully-synced capacity from 16 to 28 (16 base + 12 extra). (2) Includes the QUG add_liquidity debit-counter fix: liquidity_api.rs::add_liquidity now calls record_dex_qug_debit on both native-QUG paths so LP deposits survive on-chain replay (apply_dex_qug_adjustments idempotency restored). (3) MUST cargo clean --package q-api-server before building this release so the API-reported version actually reads 10.9.31, not the cached prior string. Previous: v10.9.30: LIBP2P PEER-ADDR CACHE FIX. Wireshark+log forensics on Epsilon Docker (v10.9.29 stalled at 26K) revealed real cause: [PEER CHECK] in unified_network_manager.rs:6040 reads from self.peer_addresses, which was constructed as empty HashMap at line 2675 even though bootstrap-resolution built fully-populated `all_peer_addresses` (Epsilon /ip4/89.149.241.126/tcp/9001, Beta, Gamma, Delta). Bootstrap addrs flowed into Kademlia DHT but NOT into the cache the block-pack scheduler consults — every chunk targeting Epsilon (only peer with full historical chain) hit "NOT connected and has NO cached address!" and round-robin'd to random tip peers whose block-pack returns empty for ranges <18M. Fix (one line): seed peer_addresses from all_peer_addresses.clone() at construction. PLUS: QNarwhalEvent::Identify(Received) was previously debug-logged and discarded — now inserts info.listen_addrs into peer_addresses so we keep learning addresses post-bootstrap. v10.9.29 chunk-end-clip stays in place (verified working: height 0 → 26K past v10.9.28 plateau). Previous: v10.9.29: SYNC CHUNK-END CLIP + BALANCE INTEGRITY. (1) Genesis-window cap now clips chunk END to window_cap, not just filters by chunk start — fixes v10.9.28 stall at 26K where a single oversized chunk (ML predictor picked huge size) spanned 26K→18M, passed the start≤cap filter, then failed ingest because the response body covered heights far beyond the 10K window. With end-clipping every dispatched chunk's response is guaranteed ingestable. Applied to all 3 cap sites (split_into_chunks, gap-fill, sync_to_height). (2) CRITICAL: save_wallet_balance (singular) now has max-wins guard per CLAUDE.md Rule 1. Stale writes that would LOWER a balance are now SKIPPED with ERROR log, on-disk value preserved. The plural save_wallet_balances had this guard but the singular form was missing it — production was observing 5% balance fluctuation on Epsilon because of this gap. Previous: v10.9.28: SYNC INGESTION FIX + METRIC WIRING. (1) Q_GENESIS_LOOKAHEAD_BLOCKS default lowered 1M → 10K to match the pre-existing GAP_SKIP_REFUSED ingestion safety cap — v10.9.27 dispatched chunks within 1M of contiguous but >90% got refused at ingest with "Gap exceeds safety cap 10000", causing 0 height advance + 50MB/min RSS leak from the retry-storm. With 10K window, every dispatched chunk is ingestable. (2) Wired qnk_local_height + qnk_blocks_synced_total gauges from the existing 5s height reconciler so /metrics emits an honest sync-progress signal (was stuck at 0 in v10.9.27 due to missing callers). Remaining metric wiring (chunks_in_flight, retry_total, bootstrap_dial, block_pack_request, libp2p_swarm_*) tracked as follow-up commits — those need turbo_sync + unified_network_manager hooks. Previous: v10.9.27: "WORKS OUT OF THE BOX" — auto-defaults for fresh nodes (Q_GENESIS_SYNC_ONLY + Q_SKIP_CHECKPOINT auto-set when DB is empty), P2P port 9001 auto-fallback to 9100-9999 on EADDRINUSE, comprehensive Prometheus /metrics endpoint (qnk_peers_connected, qnk_block_pack_request_total, qnk_chunk_retry_total, libp2p_swarm_connections_closed_total{cause} — see crates/q-network/src/metrics.rs), client-side per-peer block-pack semaphore (CLIENT_INFLIGHT_BLOCK_PACK_PER_PEER=4) + retry-storm dampener (ClientThrottle errors don't consume retry budget), libp2p memory-connection-limits behaviour wired (1 GiB default, Q_MAX_MEMORY_BYTES tunable), connection-close WARN diagnostic with cause string (journalctl-visible at Epsilon's WARN level), banner network_id resolution fixed to match runtime (env-first, not clap-default-first). Diagnostic-by-curl: `curl :PORT/metrics | grep libp2p_swarm_connections_closed_total` shows close reasons; `qnk_bootstrap_dial_total{result="failed"}` shows dial outcomes; `qnk_block_pack_request_total{direction="out",result="throttle"}` shows client back-pressure. Previous: v10.9.26: GENESIS-WINDOW SCHEDULER (FULL COVERAGE). v10.9.25 only patched sync_to_height; multiple other chunk-building call sites (split_into_chunks at line 4167, gap-fill at line 3576+) bypassed the cap and produced requests at heights > local + 1M, causing the "synced 26k blocks then stops" symptom on Beta + Epsilon docker tests. Both v10.9.25 and v10.9.26 honor Q_GENESIS_SYNC_ONLY=1. Previous: v10.9.25: GENESIS-WINDOW SCHEDULER. Fixes "synced 4045 blocks then gravity-assist spins forever" pattern in genesis mode. When Q_GENESIS_SYNC_ONLY=1, turbo_sync.rs::sync_to_height filters the chunk set to chunks within Q_GENESIS_LOOKAHEAD_BLOCKS (default 1M) of contiguous height. Without the cap, gravity-assist's parallel streams were saving blocks at heights 6M, 9M, 13M while the contiguous chain crawled forward from genesis at ~22 bps — wasting bandwidth on blocks that couldn't unblock progress until the gap below filled. With the cap, every in-flight chunk directly extends the contiguous chain. Checkpoint and endgame modes unaffected. Previous: v10.9.24: SYNC-UNWEDGE FIXES. (1) qblock:latest pointer heal at startup — if scan_highest_contiguous returns N > current qblock:latest, force qblock:latest = N. Unsticks turbo-sync request building after a checkpoint apply (was producing range:0-0 forever because pointer-cap could never walk past gap). (2) Readiness ArchiveComplete now requires `contiguous >= max(local_tip, peer_max_height)` AND at least one peer-height-proof seen — fixes premature ArchiveComplete at 21k blocks when peer-heights haven't propagated yet. Previous: v10.9.22: SYNC-LIVE FIX. Stops the mining-rejection feedback loop that wedged Epsilon (1342% CPU / 52GB RSS / VDF spawn_blocking timeouts). Two changes: (1) handlers.rs:9794 — rate-limit the 503 mining-reject `warn!` to once per 30s (was firing 2K+/sec with 400 miners, matching the success-log rate-limit at line 9837). (2) main.rs:25321 — custom TraceLayer on_failure that suppresses ERROR logs for 503 SERVICE_UNAVAILABLE so tower stops doubling the storm. Together these prevent the journald-saturation → libp2p-starvation cascade that left Epsilon perpetually 10K+ blocks behind tip and unable to serve new-node bootstrap. Previous: v10.9.21: HONEST LIQUIDITY. bootstrap_bridge_pools no longer auto-mints unbacked wBTC at boot — pools start as empty shells; real LPs must deposit. handlers.rs swap path returns "No wBTC liquidity yet — be the first LP" instead of silently trading against fake supply. NEW one-click LP flow: POST /api/v1/bitcoin/lp/intent escrows QUG, generates Knots deposit address, and on finalize atomically mints wBTC + pulls escrowed QUG + adds liquidity, minting LP tokens to the user (cancel/refund + finalize/list/get endpoints, LP intent persisted in CF_MANIFEST under btc_lp_intent:*). Frontend gains a "Bridge LP" tab in BitcoinSwapModal with the wizard. Previous: v10.9.20: wBTC reserve check gated on `use_oracle` so AMM-pool swaps work without a configured Bitcoin bridge. bootstrap_bridge_pools preserves traded reserves across restarts (only reseeds when drained below 1% of bootstrap). /api/v1/bitcoin/withdraw gains real bitcoin::Address mainnet validation + optional fee_priority (economy/normal/fast → Knots conf_target 30/6/2). DepositBridge::send_to_address_with_target + send_withdrawal(conf_target). Frontend BitcoinSwapModal: real user-pasted compressed BTC pubkey required for HTLC swaps (no more fake 0x02||qnk_addr fabrication); confirmation text 3→6 blocks to match BTC_MIN_CONFIRMATIONS. sendBitcoin() in services/api.ts now hits the real /v1/bitcoin/withdraw instead of the nonexistent /v1/bitcoin/send.  Previous: v10.9.19: huge "hum" release. (1) Track A TUI readiness banner Bootstrapping/FastReady/CheckpointTrust/GenesisSync/ArchiveComplete. (2) GET /api/v1/engine/pulse — comprehensive live vitals JSON with sync heights, mining counters, P2P bytes, mempool size, gap-to-tip, wallet count, decentralization EMA. (3) GET /api/v1/proof/tip — Phase 1 placeholder recursive-SNARK endpoint (wallet integration unblocked). (4) K-parameter gauge extended to 5 cards with new Engine Pulse column (data integrity / quorum / API count / P2P). (5) Boot tracker step 10 shows Q_BOOTSTRAP_MIN_PEERS knob. (6) HEALTH log cosmetic fix — "unbounded" instead of "0.0G (0%)" when cgroup has no limit. (7) Phase 2 trigger requires 3 consecutive ready ticks (~90s) before firing to avoid false-positives on small peer sets. (8) max_established_per_peer raised 2→4, tunable via Q_MAX_CONNS_PER_PEER. New q-ivc-verifier-wasm Phase 1 scaffold crate. DeepSeek job-board doc shipped covering Jobs A-K. Track C dilithium fixtures + Track D network instrumentation still deferred (submitted patches had compile/math issues).
edition = "2021"
