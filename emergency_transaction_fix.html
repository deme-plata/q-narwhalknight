    window.fetch = async function(url, options) {
        if (url && url.includes('/v1/transactions/send') && options && options.method === 'POST') {
            console.log('🔧 EMERGENCY: Intercepting transaction send request');
            console.log('🔍 Original URL:', url);
            console.log('🔍 Original options:', options);
            
            try {
                let body = options.body;
                if (typeof body === 'string') {
                    body = JSON.parse(body);
                }
                
                console.log('📦 EMERGENCY: Original request body:', body);
                
                // THE FIX: Ensure amount is sent as QNK value, not converted to smallest units
                if (body.amount) {
                    const originalAmount = body.amount;
                    let fixedAmount;
                    
                    // If amount is a large number (indicating unit conversion happened), convert back
                    if (originalAmount > 1000000) {
                        fixedAmount = originalAmount / 100000000; // Convert back from smallest units
                        console.log(`🔧 EMERGENCY: Detected unit conversion! ${originalAmount} -> ${fixedAmount} QNK`);
                    } else {
                        fixedAmount = parseFloat(originalAmount);
                        console.log(`✅ EMERGENCY: Amount already in QNK: ${fixedAmount}`);
                    }
                    
                    body.amount = fixedAmount;
                }
                
                console.log('✅ EMERGENCY: Fixed request body:', body);
                
                const fixedOptions = {
                    ...options,
                    body: JSON.stringify(body)
                };
                
                return originalFetch.call(this, url, fixedOptions);
                
            } catch (error) {
                console.error('❌ EMERGENCY: Transaction fix error:', error);

                return originalFetch.call(this, url, options);

        }

        return originalFetch.call(this, url, options);

    // LEVEL 2: XMLHttpRequest Override (Backup Fix)

                    console.log('⚠️ EMERGENCY: Could not parse XHR data, using original');

            return originalSend.call(this, data);

        return xhr;

    // Copy static properties
    Object.setPrototypeOf(window.XMLHttpRequest, originalXMLHttpRequest);
    Object.setPrototypeOf(window.XMLHttpRequest.prototype, originalXMLHttpRequest.prototype);
    
    // LEVEL 3: Global Transaction Validator

        validateAndFix: function(transactionData) {

    const originalSetState = React && React.Component && React.Component.prototype.setState;

    EventTarget.prototype.addEventListener = function(type, listener, options) {

            const wrappedListener = function(event) {
                console.log('🔧 EMERGENCY: Intercepting form submit event');

                return listener.call(this, event);
            };
            return originalAddEventListener.call(this, type, wrappedListener, options);
        }
        return originalAddEventListener.call(this, type, listener, options);
    };
