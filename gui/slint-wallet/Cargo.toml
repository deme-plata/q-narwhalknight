[package]
name = "slint-wallet"
version.workspace = true
edition = "2021"
description = "Q-NarwhalKnight Native Wallet - Slint GUI"
license = "MIT"

[features]
default = ["gpu-opencl"]
gpu-opencl = ["opencl3"]

[dependencies]
slint = { version = "1.16", features = ["renderer-software"] }
toml = "0.8"
dirs = "5"
display-info = "0.5"
reqwest = { version = "0.12", features = ["json", "rustls-tls", "stream"], default-features = false }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "time", "sync"] }
ed25519-dalek = { version = "2", features = ["rand_core"] }
sha2 = "0.10"
sha3 = "0.10"
base64 = "0.22"
blake3 = { version = "1.5", features = ["prefer_intrinsics"] }
bip39 = "2"
hex = "0.4"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
rand = "0.8"
chrono = { version = "0.4", features = ["serde"] }
anyhow = "1"
futures-util = "0.3"
futures = "0.3"
eventsource-client = "0.12"
self-replace = "1.5"
semver = "1"
arboard = "3"
qrcode = "0.14"
tiny_http = "0.12"
urlencoding = "2"
num_cpus = "1.16"
core_affinity = "0.8"
raw-cpuid = "11"

# v11.2.0: cross-platform system tray + single-instance enforcement
tray-icon = "0.21"
single-instance = "0.3"
# Tray icon RGBA decoder (the PNG is embedded via include_bytes!)
image = { version = "0.25", default-features = false, features = ["png"] }
# v11.3.0: cross-platform desktop notifications + IPC for protocol-handler forwarding
notify-rust = "4"
interprocess = "2"

[target.'cfg(not(windows))'.dependencies]
# OpenCL ICD loader doesn't cross-compile cleanly to x86_64-pc-windows-gnu via
# MinGW. Windows builds get CPU-only mining — Linux/macOS keep GPU support.
opencl3 = { version = "0.9", optional = true }

[target.'cfg(windows)'.dependencies]
winapi = { version = "0.3", features = ["processthreadsapi", "sysinfoapi", "winnt"] }
# v11.3.0: Windows-native toast + Start Menu shortcut + Run-key autostart + protocol handler registry
tauri-winrt-notification = "0.7"
mslnk = "0.1"
winreg = "0.52"

[build-dependencies]
slint-build = "1.16"

[target.'cfg(windows)'.build-dependencies]
winres = "0.1"
