version: '3.8'

networks:
  qnarwhal-mesh:
    external: true

services:
  beta-coordinator:
    image: python:3.9-slim
    container_name: beta-coordinator
    networks:
      qnarwhal-mesh:
        ipv4_address: 172.20.0.20
    ports:
      - "8181:8081"
    volumes:
      - ./beta_coordinator.py:/app/beta_coordinator.py
    working_dir: /app
    command: ["python", "beta_coordinator.py"]
    
  alpha-node-1:
    image: python:3.9-slim
    container_name: alpha-node-1
    networks:
      qnarwhal-mesh:
        ipv4_address: 172.20.0.31
    volumes:
      - ./alpha_node.py:/app/alpha_node.py
    working_dir: /app
    depends_on:
      - beta-coordinator
    command: ["python", "alpha_node.py", "alpha-1"]
    
  alpha-node-2:
    image: python:3.9-slim
    container_name: alpha-node-2
    networks:
      qnarwhal-mesh:
        ipv4_address: 172.20.0.32
    volumes:
      - ./alpha_node.py:/app/alpha_node.py
    working_dir: /app
    depends_on:
      - beta-coordinator
    command: ["python", "alpha_node.py", "alpha-2"]
