# Simple Q-NarwhalKnight Distribution Server
# For use with: sudo cp nginx-simple.conf /etc/nginx/sites-available/q-narwhalknight
#               sudo ln -sf /etc/nginx/sites-available/q-narwhalknight /etc/nginx/sites-enabled/
#               sudo nginx -t && sudo systemctl reload nginx

server {
    listen 8080;
    server_name localhost;
    
    # Document root - adjust path as needed
    root /opt/orobit/shared/q-narwhalknight;
    index index.html;
    
    # Logging
    access_log /var/log/nginx/q-narwhalknight-access.log;
    error_log /var/log/nginx/q-narwhalknight-error.log;
    
    # Main install script
    location = /install.sh {
        add_header Content-Type "text/plain";
        add_header Content-Disposition "attachment; filename=install.sh";
        try_files $uri =404;
    }
    
    # Binary downloads
    location /downloads/ {
        alias /opt/orobit/shared/q-narwhalknight/target/release/;
        add_header Content-Type "application/octet-stream";
        add_header Content-Disposition "attachment";
        
        # Only allow specific binaries
        location ~ ^/downloads/(q-narwhalknight|dagknight)$ {
            try_files $uri =404;
        }
        
        # Deny other files
        location ~* {
            deny all;
        }
    }
    
    # Documentation and web interface
    location / {
        try_files $uri $uri/ @homepage;
    }
    
    # Fallback homepage
    location @homepage {
        return 200 '<!DOCTYPE html>
<html>
<head>
    <title>Q-NarwhalKnight Distribution</title>
    <style>
        body { font-family: sans-serif; margin: 40px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .container { max-width: 600px; margin: 0 auto; }
        .logo { font-size: 2em; margin-bottom: 20px; }
        .install { background: rgba(0,0,0,0.3); padding: 20px; border-radius: 8px; margin: 20px 0; }
        pre { font-size: 16px; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="logo">🌊 Q-NarwhalKnight Distribution</h1>
        <p>Quantum-Enhanced DAG-BFT Consensus Node</p>
        
        <div class="install">
            <h2>🚀 Quick Install</h2>
            <pre>curl -fsSL http://localhost:8080/install.sh | bash</pre>
        </div>
        
        <p><strong>Features:</strong></p>
        <ul>
            <li>🔮 Quantum-Enhanced Consensus</li>
            <li>🧅 Tor Integration</li>
            <li>⚡ Sub-microsecond Precision</li>
            <li>🔗 Multi-Chain Bridges</li>
            <li>🤖 AI Water Robot Collaboration</li>
            <li>💎 KUSD Quantum Stablecoin</li>
        </ul>
        
        <p><a href="/install.sh">📥 Download install.sh</a> | 
           <a href="/downloads/q-narwhalknight">📦 Binary</a></p>
    </div>
</body>
</html>';
        add_header Content-Type "text/html";
    }
    
    # Health check
    location /health {
        return 200 '{"status":"ok","service":"q-narwhalknight-distribution"}';
        add_header Content-Type "application/json";
    }
}