# Enable tokio_unstable for console-subscriber support
# DISABLED: Removed to allow normal compilation
# [build]
# rustflags = ["--cfg", "tokio_unstable"]

# v8.0.8: Use x86-64-v2 baseline for portable binaries (SSE4.2, POPCNT)
# blake3 has runtime CPU detection — auto-uses AVX2/AVX-512 if available
# For local nodes wanting max perf: RUSTFLAGS="-C target-cpu=native" cargo build
[target.x86_64-unknown-linux-gnu]
rustflags = ["-C", "target-cpu=x86-64-v2"]

[target.x86_64-pc-windows-gnu]
linker = "x86_64-w64-mingw32-gcc"
ar = "x86_64-w64-mingw32-ar"

[target.x86_64-pc-windows-msvc]
linker = "/opt/orobit/shared/q-narwhalknight/.cargo/lld-link-wrapper.sh"
rustflags = ["-C", "link-arg=-fuse-ld=lld"]

[target.aarch64-unknown-linux-gnu]
linker = "aarch64-linux-gnu-gcc"

[env]
CC_x86_64_pc_windows_gnu = "x86_64-w64-mingw32-gcc"
CXX_x86_64_pc_windows_gnu = "x86_64-w64-mingw32-g++"
CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER = "x86_64-w64-mingw32-gcc"
CC_aarch64_unknown_linux_gnu = "aarch64-linux-gnu-gcc"
CXX_aarch64_unknown_linux_gnu = "aarch64-linux-gnu-g++"
PKG_CONFIG_ALLOW_CROSS = "1"
# Force lzma-sys to build liblzma from vendored source (system pkg-config
# returns Linux paths that break Windows cross-compilation)
LZMA_API_STATIC = "1"
