      - Q_DNS_PHANTOM_DISCOVERY=true
    networks:
      - qnarwhal-net
    depends_on:
      - dns-phantom-hub
    volumes:
      - ./target/release:/app/bin
    command: ["/app/bin/q-api-server", "--node-id", "validator-03", "--consensus-validator"]

  # Monitoring and metrics service
  prometheus:
    image: prom/prometheus:latest
    container_name: q-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - qnarwhal-net
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'

  grafana:
    image: grafana/grafana:latest
    container_name: q-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./docker/grafana-dashboards:/var/lib/grafana/dashboards
    networks:
      - qnarwhal-net
    depends_on:
      - prometheus

  # Load testing service
  load-tester:
    build:
      context: .
      dockerfile: docker/Dockerfile.qnarwhal
    container_name: q-load-tester
    environment:
      - RUST_LOG=info
      - Q_LOAD_TEST_MODE=massive_scale
      - Q_TARGET_TPS=50000
      - Q_TEST_DURATION=600
    networks:
      - qnarwhal-net
    depends_on:
      - beta-coordinator
      - alpha-node-01
    volumes:
      - ./target/release:/app/bin
    command: ["/app/bin/massive_scale_test", "--validators", "50", "--duration", "600", "--real-dht"]

networks:
  qnarwhal-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  prometheus-data:
  grafana-data: