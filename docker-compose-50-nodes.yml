    volumes:
      - ./target/release:/app/bin
    command: ["/app/bin/q-api-server", "--node-id", "alpha-node-10", "--target-beta", "beta-coordinator:8081"]

  # Consensus validator nodes (40 nodes)
  validator-01:
    build:
      context: .
      dockerfile: docker/Dockerfile.qnarwhal
    container_name: q-validator-01
    environment:
      - RUST_LOG=info
      - Q_NODE_ID=validator-01
      - Q_SERVER_ROLE=validator
      - Q_CONSENSUS_MODE=dag_knight
      - Q_TOR_PROXY=tor-proxy:9050
      - Q_DNS_PHANTOM_DISCOVERY=true
    networks:
      - qnarwhal-net
    depends_on:
      - dns-phantom-hub
    volumes:
      - ./target/release:/app/bin
    command: ["/app/bin/q-api-server", "--node-id", "validator-01", "--consensus-validator"]

  # Generate remaining validators using a template
  # Validators 02-40 would follow similar pattern but with different node IDs
  # For brevity, showing first few examples:

  validator-02:
    build:
      context: .
      dockerfile: docker/Dockerfile.qnarwhal
    container_name: q-validator-02
    environment:
      - RUST_LOG=info
      - Q_NODE_ID=validator-02
