version: '3.8'

services:
  # Core infrastructure services
  tor-proxy:
    image: torproject/tor:latest
    container_name: q-tor-proxy
    ports:
      - "9050:9050"
      - "9051:9051"
    volumes:
      - ./docker/tor-config:/etc/tor
    command: ["tor", "-f", "/etc/tor/torrc"]
    networks:
      - qnarwhal-net
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "9050"]
      interval: 5s
      retries: 5

  dns-phantom-hub:
    build:
      context: .
      dockerfile: docker/Dockerfile.qnarwhal
    container_name: q-dns-phantom-hub
    ports:
      - "8053:53/udp"
      - "8080:8080"
    environment:
      - RUST_LOG=info
      - Q_NODE_ROLE=dns_phantom_hub
      - Q_DNS_STEGANOGRAPHIC=true
    networks:
      - qnarwhal-net
    depends_on:
      - tor-proxy
    volumes:
      - ./target/release:/app/bin
    command: ["/app/bin/q-api-server", "--dns-phantom-hub", "--port", "8080"]

  # Beta server - main coordinator
  beta-coordinator:
    build:
      context: .
      dockerfile: docker/Dockerfile.qnarwhal
    container_name: q-beta-coordinator
    ports:
      - "8081:8081"
      - "8082:8080"
    environment:
      - RUST_LOG=info
      - Q_NODE_ID=beta-coordinator
      - Q_SERVER_ROLE=beta
      - Q_P2P_PORT=8081
      - Q_API_PORT=8080
      - Q_TOR_PROXY=tor-proxy:9050
      - Q_DNS_PHANTOM_DISCOVERY=true
    networks:
      - qnarwhal-net
    depends_on:
      - tor-proxy
      - dns-phantom-hub
    volumes:
      - ./target/release:/app/bin
      - ./docker/logs:/app/logs
    command: ["/app/bin/q-api-server", "--node-id", "beta-coordinator", "--p2p-port", "8081", "--api-port", "8080"]

  # Alpha nodes (10 nodes)
  alpha-node-01:
    build:
      context: .
      dockerfile: docker/Dockerfile.qnarwhal
    container_name: q-alpha-node-01
    environment:
      - RUST_LOG=info
      - Q_NODE_ID=alpha-node-01
      - Q_SERVER_ROLE=alpha
      - Q_BETA_TARGET=beta-coordinator:8081
      - Q_TOR_PROXY=tor-proxy:9050
      - Q_DNS_PHANTOM_DISCOVERY=true
    networks:
      - qnarwhal-net
    depends_on:
      - beta-coordinator
      - dns-phantom-hub
    volumes:
      - ./target/release:/app/bin
    command: ["/app/bin/q-api-server", "--node-id", "alpha-node-01", "--target-beta", "beta-coordinator:8081"]

  alpha-node-02:
    build:
      context: .
      dockerfile: docker/Dockerfile.qnarwhal
    container_name: q-alpha-node-02
    environment:
      - RUST_LOG=info
      - Q_NODE_ID=alpha-node-02
      - Q_SERVER_ROLE=alpha
      - Q_BETA_TARGET=beta-coordinator:8081
      - Q_TOR_PROXY=tor-proxy:9050
      - Q_DNS_PHANTOM_DISCOVERY=true
    networks:
      - qnarwhal-net
    depends_on:
      - beta-coordinator
    volumes:
      - ./target/release:/app/bin
    command: ["/app/bin/q-api-server", "--node-id", "alpha-node-02", "--target-beta", "beta-coordinator:8081"]

  alpha-node-03:
