version: '3.8'

services:
  # Infrastructure Services (4 containers)
  tor-proxy:
    image: torproject/tor:latest
    container_name: q-tor-proxy
    ports:
      - "9050:9050"
      - "9051:9051"
    volumes:
      - ./docker/tor-config:/etc/tor
    networks:
      qnarwhal-massivenet:
        aliases:
          - tor-proxy.onion
    command: ["tor", "-f", "/etc/tor/torrc"]

  dns-phantom-hub:
    image: ubuntu:20.04
    container_name: q-dns-phantom-hub
    ports:
      - "8053:53/udp"
      - "8080:8080"
    environment:
      - RUST_LOG=info
      - Q_NODE_ROLE=dns_phantom_hub
      - Q_DISCOVERY_SCALE=50_nodes
    networks:
      qnarwhal-massivenet:
        aliases:
          - discovery.phantom
          - dns-hub.onion
    depends_on:
      - tor-proxy
    command: |
      bash -c "
        echo '🔍 DNS-Phantom Hub - 50-Node Massive Scale Discovery'
        apt-get update && apt-get install -y netcat dnsutils >/dev/null 2>&1
        
        # Install netcat
        nc -l -p 8080 &
        
        while true; do
          echo '[$(date)] DNS-Phantom: Broadcasting 50-node topology'
          echo 'Steganographic discovery: 50 Q-NarwhalKnight nodes'
          echo 'Hidden onion addresses: beta-coord + 10 alphas + 39 validators'
          echo 'Mesh formation: Massive scale DAG-Knight consensus'
          sleep 30
        done
      "

  prometheus:
    image: prom/prometheus:latest
    container_name: q-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - qnarwhal-massivenet
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  grafana:
    image: grafana/grafana:latest
    container_name: q-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=q-narwhal-50nodes
    volumes:
      - grafana-storage:/var/lib/grafana
    networks:
      - qnarwhal-massivenet
    depends_on:
      - prometheus

  # Beta Coordinator - Server Beta Bridge (1 container)
  beta-coordinator:
    image: ubuntu:20.04
    container_name: q-beta-coordinator
    ports:
      - "8081:8081"
      - "8082:8080"
    environment:
      - RUST_LOG=info
      - Q_NODE_ID=beta-coordinator
      - Q_SERVER_ROLE=beta
      - Q_MASSIVE_SCALE=50_nodes
      - Q_TARGET_ALPHA_IP=185.182.185.227
    networks:
      qnarwhal-massivenet:
        aliases:
          - beta-coord.onion
          - server-beta-bridge
    depends_on:
      - dns-phantom-hub
      - tor-proxy
    command: |
      bash -c "
        echo '🤝 Beta Coordinator - 50-Node Massive Scale Bridge'
        echo 'Server Beta Bridge: 185.182.185.227:8081 simulation'
        
        apt-get update && apt-get install -y netcat >/dev/null 2>&1
        
        # Start connection bridge for Alpha nodes
        nc -l -k -p 8081 &
        
        while true; do
          echo '[$(date)] Beta: 50-node coordinator active'
          echo 'Awaiting 10 Alpha connections from Server Alpha'
          echo 'Coordinating 39 validator nodes in consensus'
          echo 'Current connections: $(ss -t | grep :8081 | grep ESTAB | wc -l)'
          sleep 45
        done
      "

